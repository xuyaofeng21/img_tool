name: Build Releases

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$HOME/.cargo/bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv .venv
          .venv\Scripts\Activate.ps1
          uv pip install -e .
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          .venv\Scripts\Activate.ps1
          pyinstaller --noconfirm --clean ImgToolbox.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\ImgToolbox -DestinationPath ImgToolbox-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImgToolbox-Windows
          path: ImgToolbox-Windows.zip

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6 \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            appstream \
            libfuse2 \
            curl \
            desktop-file-utils \
            software-properties-common
          # 添加 deadsnakes PPA 获取 Python 3.12
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.12 python3.12-venv python3.12-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          source .venv/bin/activate
          pyinstaller --noconfirm --clean ImgToolbox.spec

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/{bin,share/applications,share/icons/hicolor/256x256/apps}
          
          # 复制可执行文件和资源
          cp -r dist/ImgToolbox/* AppDir/usr/bin/
          
          # 创建桌面文件
          cat > AppDir/usr/share/applications/imgtoolbox.desktop << 'EOF'
          [Desktop Entry]
          Name=ImgToolbox
          Comment=个人图片批量处理工具箱
          Exec=ImgToolbox
          Icon=imgtoolbox
          Terminal=false
          Type=Application
          Categories=Graphics;Utility;
          EOF
          
          # 创建 AppRun 入口脚本
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/ImgToolbox" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/imgtoolbox.desktop \
            --output appimage
          
          # 重命名输出
          mv ImgToolbox-*.AppImage ImgToolbox-Linux.AppImage || true
          # 如果没有生成带版本号的，用默认名
          if [ ! -f "ImgToolbox-Linux.AppImage" ]; then
            ls -la *.AppImage || echo "No AppImage found"
            # 尝试找到生成的 AppImage
            find . -name "*.AppImage" -exec mv {} ImgToolbox-Linux.AppImage \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImgToolbox-Linux
          path: ImgToolbox-Linux.AppImage

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ImgToolbox-Windows
          path: release-assets/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ImgToolbox-Linux
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
