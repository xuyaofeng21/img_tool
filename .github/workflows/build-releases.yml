name: Build Releases

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          .venv\Scripts\Activate.ps1
          uv pip install -e .
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          .venv\Scripts\Activate.ps1
          pyinstaller --noconfirm --clean ImgToolbox.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\ImgToolbox -DestinationPath ImgToolbox-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImgToolbox-Windows
          path: ImgToolbox-Windows.zip

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6 \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            appstream \
            libfuse2 \
            curl \
            desktop-file-utils \
            gir1.2-gtk-3.0 \
            libgirepository1.0-dev \
            gcc \
            libcairo2-dev \
            pkg-config \
            python3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install pyinstaller pygobject

      - name: Build with PyInstaller
        run: |
          source .venv/bin/activate
          pyinstaller --noconfirm --clean ImgToolbox.spec

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          # 复制可执行文件和资源
          cp -r dist/ImgToolbox/* AppDir/usr/bin/

          # 创建图标（使用 ImageMagick 生成真正的 256x256 PNG）
          convert -size 256x256 xc:"#4A90D9" AppDir/usr/share/icons/hicolor/256x256/apps/imgtoolbox.png

          # 创建桌面文件
          printf '[Desktop Entry]\nName=ImgToolbox\nComment=Personal Image Batch Processing Toolbox\nExec=ImgToolbox\nIcon=imgtoolbox\nTerminal=false\nType=Application\nCategories=Graphics;Utility;\n' > AppDir/usr/share/applications/imgtoolbox.desktop

          # 创建 AppRun
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/usr/bin/ImgToolbox" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/imgtoolbox.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/imgtoolbox.png \
            --output appimage
          
          # 查找生成的 AppImage 并重命名
          find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" | head -1 | xargs -I{} mv {} ImgToolbox-Linux.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImgToolbox-Linux
          path: ImgToolbox-Linux.AppImage

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ImgToolbox-Windows
          path: release-assets/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ImgToolbox-Linux
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ github.event_name == 'push' && github.ref_name || format('Build #{0}', github.run_number) }}
          body: |
            ## 自动构建产物
            
            - **Windows**: ImgToolbox-Windows.zip (EXE + 依赖)
            - **Linux**: ImgToolbox-Linux.AppImage (单文件运行)
            
            > 注意：当前版本仅支持手动合成功能，系统合成已暂时屏蔽。
          files: release-assets/*
          draft: false
          prerelease: ${{ github.event_name != 'push' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
