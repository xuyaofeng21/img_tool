<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人图片批量处理工具箱</title>
  <style>
    :root {
      --bg-a: #f4f8ff;
      --bg-b: #edf7f1;
      --bg-c: #f8f4ff;
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.85);
      --line: rgba(255, 255, 255, 0.78);
      --text: #1b2437;
      --muted: #4a5875;
      --brand: #4a8cff;
      --brand-2: #3a7be8;
      --brand-glow: rgba(74, 140, 255, 0.18);
      --success: #00b578;
      --warn: #ffb020;
      --danger: #f54a45;
      --shadow: 0 18px 50px rgba(34, 69, 122, 0.10);
      --shadow-soft: 0 10px 24px rgba(34, 69, 122, 0.06);
      --shadow-hover: 0 22px 48px rgba(74, 140, 255, 0.15);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 15px;
      --transition-fast: 0.15s ease;
      --transition-med: 0.22s ease;
      --sidebar-width: 220px;
      --sidebar-collapsed: 56px;
    }

    * { box-sizing: border-box; }

    /* 自定义滚动条样式 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(74, 140, 255, 0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(74, 140, 255, 0.45); }
    * { scrollbar-width: thin; scrollbar-color: rgba(74, 140, 255, 0.25) transparent; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      color: var(--text);
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(74, 140, 255, 0.14), transparent 30%),
        radial-gradient(circle at 88% 15%, rgba(0, 181, 120, 0.10), transparent 26%),
        radial-gradient(circle at 42% 90%, rgba(245, 74, 69, 0.06), transparent 22%),
        linear-gradient(138deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(55px);
      pointer-events: none;
      opacity: 0.40;
      z-index: 0;
    }

    body::before {
      width: 340px;
      height: 340px;
      left: -100px;
      top: 80px;
      background: radial-gradient(circle, rgba(74, 140, 255, 0.22) 0%, transparent 70%);
    }

    body::after {
      width: 400px;
      height: 400px;
      right: -130px;
      bottom: -130px;
      background: radial-gradient(circle, rgba(0, 181, 120, 0.18) 0%, transparent 70%);
    }

    .shell {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
      transition: grid-template-columns var(--transition-med);
    }

    .shell.sidebar-collapsed {
      grid-template-columns: var(--sidebar-collapsed) minmax(0, 1fr);
    }

    .sidebar,
    .hero,
    .form-card,
    .log-card,
    .result-card {
      background: var(--glass);
      border: 1px solid var(--line);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
    }

    .sidebar {
      border-radius: var(--radius-xl);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow: visible;
      max-height: 100vh;
      transition: padding var(--transition-med);
      position: relative;
    }

    /* 侧边栏折叠按钮 */
    .sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      cursor: pointer;
      color: var(--muted);
      transition: color var(--transition-fast), background var(--transition-fast);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(74, 140, 255, 0.1);
      flex-shrink: 0;
    }
    .sidebar-toggle:hover { color: var(--brand); background: rgba(255, 255, 255, 0.8); }
    .sidebar-toggle-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: transform var(--transition-med);
    }
    .sidebar-collapsed .sidebar-toggle-icon { transform: rotate(180deg); }
    .sidebar-toggle-icon svg { width: 14px; height: 14px; }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.50);
      overflow: hidden;
      transition: opacity var(--transition-med), max-height var(--transition-med), padding var(--transition-med), margin var(--transition-med);
      max-height: 80px;
    }
    .sidebar-collapsed .brand { opacity: 0; max-height: 0; padding: 0; margin: 0; border: none; pointer-events: none; }
    .brand-title { font-size: 16px; font-weight: 800; letter-spacing: 0.3px; line-height: 1.2; white-space: nowrap; }
    .brand-subtitle { color: var(--muted); font-size: 10px; line-height: 1.4; }

    /* 导航区域 */
    .nav-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      padding-right: 2px;
      margin-right: -2px;
    }
    .nav { display: flex; flex-direction: column; gap: 6px; }

    .nav-btn {
      border: 1px solid rgba(74, 140, 255, 0.12);
      background: rgba(255, 255, 255, 0.65);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-med), border-color var(--transition-med), background var(--transition-med), padding var(--transition-med);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(74, 140, 255, 0.32);
      background: rgba(255, 255, 255, 0.82);
    }
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(74, 140, 255, 0.14), rgba(74, 140, 255, 0.06));
      border-color: rgba(74, 140, 255, 0.40);
      box-shadow: var(--shadow-hover), inset 0 0 0 1px rgba(74, 140, 255, 0.12);
    }
    .nav-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .nav-btn:disabled, .btn:disabled, input:disabled { cursor: not-allowed; opacity: 0.62; }

    .nav-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
      transition: width var(--transition-med);
    }

    .nav-content {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      transition: opacity var(--transition-med), max-width var(--transition-med);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-collapsed .nav-content { opacity: 0; max-width: 0; overflow: hidden; }
    .sidebar-collapsed .nav-btn { padding: 8px; justify-content: center; }

    .nav-title { font-size: 12px; font-weight: 700; line-height: 1.2; white-space: nowrap; }
    .nav-desc { font-size: 10px; color: var(--muted); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-badge { flex-shrink: 0; font-size: 10px; }
    .nav-info { flex: 1; min-width: 0; }

    /* 底部固定区域 */
    .sidebar-footer {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      transition: opacity var(--transition-med), max-height var(--transition-med);
      max-height: 200px;
    }
    .sidebar-collapsed .sidebar-footer { opacity: 0; max-height: 0; min-height: 0; margin: 0; padding: 0; gap: 0; border: none; overflow: hidden; }

    .mode-card, .status-card {
      border-radius: var(--radius-md);
      background: var(--glass-strong);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow-soft);
      padding: 10px;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .mode-group { display: grid; gap: 6px; }
    .mode-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(74, 140, 255, 0.12);
      background: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
      user-select: none;
    }
    .mode-option:hover { transform: translateY(-1px); border-color: rgba(74, 140, 255, 0.26); }
    .mode-option input { margin: 2px 0 0; flex-shrink: 0; }
    .mode-label { display: grid; gap: 1px; min-width: 0; }
    .mode-label strong { font-size: 12px; line-height: 1.25; }
    .mode-label span { font-size: 11px; color: var(--muted); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .mode-option.active { border-color: rgba(74, 140, 255, 0.34); background: linear-gradient(135deg, rgba(74, 140, 255, 0.14), rgba(255, 255, 255, 0.86)); box-shadow: 0 8px 20px rgba(74, 140, 255, 0.10); }

    .status-row { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; line-height: 1.4; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #90a4c7;
      flex: 0 0 auto;
      box-shadow: 0 0 0 0 rgba(144, 164, 199, 0.4);
    }
    .status-dot.running { background: var(--warn); animation: pulse 1.2s infinite; }
    .status-dot.success { background: var(--success); }
    .status-dot.fail { background: var(--danger); }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 176, 32, 0.38); }
      70% { box-shadow: 0 0 0 8px rgba(255, 176, 32, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 176, 32, 0); }
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid rgba(51, 112, 255, 0.14);
      background: rgba(255, 255, 255, 0.72);
      color: #2553c7;
    }

    .workspace {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .workspace > section { flex: 0 0 auto; min-width: 0; }

    .hero,
    .form-card,
    .log-card,
    .result-card {
      border-radius: var(--radius-xl);
      background: var(--glass);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
    }

    .hero {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .hero-main { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .hero-title { margin: 0; font-size: 20px; line-height: 1.2; letter-spacing: 0.2px; }
    .hero-desc { color: var(--muted); font-size: 11px; line-height: 1.5; }
    .task-strip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .task-state-chip {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid rgba(56, 92, 164, 0.16);
      background: rgba(255, 255, 255, 0.8);
      color: #2b3b58;
    }
    .task-state-chip.running { color: #8a5b00; border-color: rgba(255, 176, 32, 0.35); background: rgba(255, 176, 32, 0.16); }
    .task-state-chip.success { color: #0b7f59; border-color: rgba(0, 181, 120, 0.32); background: rgba(0, 181, 120, 0.14); }
    .task-state-chip.fail { color: #a52d29; border-color: rgba(245, 74, 69, 0.32); background: rgba(245, 74, 69, 0.14); }
    .task-duration { font-size: 11px; color: var(--muted); font-weight: 600; }
    .hero-tags { display: flex; align-items: center; justify-content: flex-end; flex-wrap: wrap; gap: 6px; }

    .form-card, .preview-card, .log-card, .result-card { padding: 14px; min-height: 0; }

    .form-grid { display: grid; gap: 12px; }
    .form-section { display: grid; gap: 8px; }
    .form-section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .form-section-head h2 { margin: 0; font-size: 13px; line-height: 1.3; }
    .form-section-head p { margin: 0; color: var(--muted); font-size: 10px; line-height: 1.4; }
    .field-grid { display: grid; gap: 8px; }

    .field-row { display: grid; grid-template-columns: 120px minmax(0, 1fr) auto; gap: 8px; align-items: center; }
    .field-row.param { grid-template-columns: 120px 180px minmax(0, 1fr); }
    .field-label { display: grid; gap: 2px; min-width: 0; }
    .field-label strong { font-size: 11px; font-weight: 700; }
    .field-label span { font-size: 10px; color: var(--muted); line-height: 1.4; }

    .input, .select {
      width: 100%;
      border: 1px solid rgba(56, 92, 164, 0.18);
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      border-radius: 10px;
      padding: 7px 10px;
      outline: none;
      font-size: 11px;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
      min-width: 0;
    }
    .input:focus, .select:focus { border-color: rgba(74, 140, 255, 0.6); box-shadow: 0 0 0 3px rgba(74, 140, 255, 0.10); }
    .input::placeholder { color: #6b7894; }

    .action-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; box-shadow: 0 10px 20px rgba(74, 140, 255, 0.22); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 14px 28px rgba(74, 140, 255, 0.26); }
    .btn-secondary { background: rgba(74, 140, 255, 0.08); color: var(--brand); border: 1px solid rgba(74, 140, 255, 0.12); }
    .btn-secondary:hover:not(:disabled) { background: rgba(74, 140, 255, 0.12); }
    .btn-ghost { background: rgba(255, 255, 255, 0.75); color: var(--text); border: 1px solid rgba(56, 92, 164, 0.10); box-shadow: var(--shadow-soft); }
    .btn-ghost:hover:not(:disabled) { background: rgba(255, 255, 255, 0.92); box-shadow: var(--shadow); }
    .helper { color: var(--muted); font-size: 10px; line-height: 1.4; }
    .divider { height: 1px; background: rgba(255, 255, 255, 0.72); margin: 2px 0; }

    .preview-card { display: grid; gap: 10px; min-height: 0; }
    .preview-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .preview-head h2 { margin: 0; font-size: 13px; }
    .preview-summary { color: var(--muted); font-size: 10px; line-height: 1.4; }
    .preview-grid { display: grid; gap: 8px; }
    .preview-block {
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(56, 92, 164, 0.12);
      padding: 10px;
      min-width: 0;
      display: grid;
      gap: 6px;
    }
    .preview-block-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .preview-block-title { font-size: 11px; font-weight: 800; }
    .preview-counts { display: flex; flex-wrap: wrap; gap: 4px; }
    .preview-count-chip {
      border-radius: 999px;
      padding: 3px 6px;
      background: rgba(74, 140, 255, 0.08);
      border: 1px solid rgba(74, 140, 255, 0.14);
      color: var(--brand);
      font-size: 10px;
      font-weight: 700;
    }
    .preview-samples { display: flex; flex-wrap: wrap; gap: 4px; }
    .preview-sample {
      border-radius: 999px;
      padding: 3px 6px;
      background: rgba(15, 20, 31, 0.05);
      color: var(--text);
      font-size: 10px;
      border: 1px solid rgba(56, 92, 164, 0.08);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview-empty {
      border-radius: var(--radius-md);
      padding: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.68);
      border: 1px dashed rgba(74, 140, 255, 0.14);
      font-size: 10px;
      line-height: 1.5;
    }

    .preview-toggle { display: none; padding-bottom: 2px; }
    .preview-toggle.has-data { display: block; }
    .preview-toggle-bar { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; color: var(--muted); font-size: 10px; transition: color var(--transition-fast); }
    .preview-toggle-bar:hover { color: var(--brand); }
    .preview-toggle-arrow { transition: transform 0.22s ease; display: inline-flex; }
    .preview-toggle-arrow.expanded { transform: rotate(180deg); }
    .preview-grid-wrapper { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.25s ease, opacity 0.2s ease; }
    .preview-grid-wrapper.expanded { max-height: 400px; opacity: 1; }

    .log-card { display: grid; gap: 10px; min-height: 0; }
    .log-head, .result-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .log-head h2, .result-head h2 { margin: 0; font-size: 13px; }
    .log-line { margin: 0 0 3px; padding-left: 2px; }
    .log-info { color: #dde6f3; }
    .log-warn { color: #ffd28a; }
    .log-error { color: #ff9a9a; }

    .result-card { display: grid; gap: 10px; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .metric {
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(56, 92, 164, 0.12);
      padding: 10px;
      min-width: 0;
    }
    .metric .k { font-size: 10px; color: var(--muted); line-height: 1.4; }
    .metric .v { margin-top: 4px; font-size: 18px; font-weight: 800; line-height: 1.1; word-break: break-word; }
    .result-paths { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .result-path {
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(56, 92, 164, 0.12);
      border-radius: 14px;
      padding: 10px;
      min-width: 0;
    }
    .result-path .k { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .result-path .v { font-size: 10px; line-height: 1.5; word-break: break-all; }
    .result-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .footer-note { color: var(--muted); font-size: 10px; line-height: 1.4; }

    .is-running .nav-btn, .is-running .mode-option, .is-running .input, .is-running .select { pointer-events: none; }

    @media (max-width: 1180px) {
      html, body { overflow: auto; }
      .shell { height: auto; min-height: 100vh; grid-template-columns: 1fr; }
      .sidebar { position: relative; max-height: none; overflow: visible; }
      .workspace { min-height: auto; }
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .result-paths { grid-template-columns: 1fr; }
      /* 在小屏幕上保持侧边栏展开状态 */
      .sidebar-collapsed .brand { opacity: 1; max-height: 80px; padding-bottom: 8px; margin-bottom: 0; border-bottom-width: 1px; }
      .sidebar-collapsed .sidebar-footer { opacity: 1; max-height: 200px; gap: 8px; }
      .sidebar-collapsed .nav-content { opacity: 1; max-width: none; }
      .sidebar-collapsed .nav-btn { padding: 8px 10px; justify-content: flex-start; }
    }

    @media (max-width: 760px) {
      .shell { padding: 12px; gap: 12px; }
      .sidebar, .hero, .form-card, .log-card, .result-card { border-radius: 20px; }
      .hero { padding: 14px; }
      .hero-title { font-size: 18px; }
      .field-row, .field-row.param { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: 1fr; }
      .action-row { display: grid; grid-template-columns: 1fr; }
      .btn { width: 100%; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-a: #1a1f2e;
        --bg-b: #151b28;
        --bg-c: #1e1a2e;
        --glass: rgba(30, 38, 55, 0.72);
        --glass-strong: rgba(40, 50, 70, 0.85);
        --line: rgba(255, 255, 255, 0.10);
        --text: #e8ecf4;
        --muted: #8b9ab5;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.25);
        --shadow-hover: 0 22px 48px rgba(74, 140, 255, 0.20);
      }
      body { background: linear-gradient(138deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%); }
      body::before { background: radial-gradient(circle, rgba(74, 140, 255, 0.15) 0%, transparent 70%); }
      body::after { background: radial-gradient(circle, rgba(0, 181, 120, 0.12) 0%, transparent 70%); }
      .nav-btn { background: rgba(40, 50, 70, 0.70); border-color: rgba(74, 140, 255, 0.15); }
      .nav-btn:hover:not(:disabled) { background: rgba(50, 62, 85, 0.85); }
      .nav-btn.active { background: linear-gradient(135deg, rgba(74, 140, 255, 0.20), rgba(74, 140, 255, 0.10)); border-color: rgba(74, 140, 255, 0.40); }
      .mode-card, .status-card { background: rgba(40, 50, 70, 0.82); border-color: rgba(255, 255, 255, 0.08); }
      .mode-option { background: rgba(40, 50, 70, 0.65); border-color: rgba(74, 140, 255, 0.15); }
      .mode-option:hover { background: rgba(50, 62, 85, 0.80); }
      .mode-option.active { background: linear-gradient(135deg, rgba(74, 140, 255, 0.18), rgba(40, 50, 70, 0.85)); }
      .input, .select { background: rgba(40, 50, 70, 0.80); border-color: rgba(74, 140, 255, 0.15); color: var(--text); }
      .input:focus, .select:focus { border-color: rgba(74, 140, 255, 0.7); box-shadow: 0 0 0 3px rgba(74, 140, 255, 0.12); }
      .btn-ghost { background: rgba(40, 50, 70, 0.75); border-color: rgba(74, 140, 255, 0.12); color: var(--text); }
      .btn-ghost:hover:not(:disabled) { background: rgba(50, 62, 85, 0.90); }
      .preview-block { background: rgba(40, 50, 70, 0.68); border-color: rgba(74, 140, 255, 0.10); }
      .preview-sample { background: rgba(255, 255, 255, 0.06); color: var(--text); border-color: rgba(74, 140, 255, 0.10); }
      .preview-empty { background: rgba(40, 50, 70, 0.60); border-color: rgba(74, 140, 255, 0.12); color: var(--muted); }
      .log-box { background: rgba(10, 14, 22, 0.95); border-color: rgba(255, 255, 255, 0.06); }
      .metric, .result-path { background: rgba(40, 50, 70, 0.68); border-color: rgba(74, 140, 255, 0.10); }
      .divider { background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent); }
      .modal-card { background: rgba(40, 50, 70, 0.92); border-color: rgba(74, 140, 255, 0.15); }
      .helper { color: var(--muted); }
      .task-state-chip { background: rgba(40, 50, 70, 0.80); border-color: rgba(74, 140, 255, 0.12); color: var(--text); }
      .task-state-chip.running { background: rgba(255, 176, 32, 0.15); border-color: rgba(255, 176, 32, 0.30); color: #ffb020; }
      .task-state-chip.success { background: rgba(0, 181, 120, 0.15); border-color: rgba(0, 181, 120, 0.28); color: #00b578; }
      .task-state-chip.fail { background: rgba(245, 74, 69, 0.15); border-color: rgba(245, 74, 69, 0.28); color: #f54a45; }
      .sidebar-toggle-icon { background: rgba(40, 50, 70, 0.80); border-color: rgba(74, 140, 255, 0.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14, 20, 34, 0.48);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 18px;
    }
    .modal-backdrop.hidden { display: none; }
    .modal-card {
      width: min(480px, 100%);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 60px rgba(23, 42, 77, 0.22);
      padding: 18px;
      display: grid;
      gap: 10px;
    }
    .modal-title { margin: 0; font-size: 18px; font-weight: 800; }
    .modal-desc { margin: 0; font-size: 13px; line-height: 1.6; color: var(--muted); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="shell" id="shellRoot">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-toggle" id="sidebarToggle" title="收起/展开侧边栏">
        <div class="sidebar-toggle-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </div>
      </div>

      <div class="brand">
        <div class="brand-title">图片工具箱</div>
        <div class="brand-subtitle">离线 · 免登录 · 本地处理</div>
      </div>

      <div class="nav-wrapper">
        <nav class="nav" id="taskNav" aria-label="功能导航"></nav>
      </div>

      <div class="sidebar-footer">
        <section class="mode-card">
          <div class="section-title">
            <span>执行模式</span>
            <span class="chip" id="modeChip">安全</span>
          </div>
          <div class="mode-group" id="modeGroup">
            <label class="mode-option active">
              <input type="radio" name="mode" value="safe_copy" checked />
              <div class="mode-label">
                <strong>安全复制</strong>
                <span>不修改原始文件，输出到指定目录。</span>
              </div>
            </label>
            <label class="mode-option">
              <input type="radio" name="mode" value="in_place" />
              <div class="mode-label">
                <strong>原地修改</strong>
                <span>执行前强制备份，适合直接覆盖原目录。</span>
              </div>
            </label>
          </div>
        </section>

        <section class="status-card">
          <div class="section-title">
            <span>运行状态</span>
            <span class="chip" id="statusBadge">Idle</span>
          </div>
          <div class="status-row">
            <span id="statusDot" class="status-dot" aria-hidden="true"></span>
            <span id="statusText">已就绪，等待选择功能并填写参数。</span>
          </div>
        </section>
      </div>
    </aside>

    <main class="workspace" id="workspaceRoot">
      <section class="hero">
        <div class="hero-main">
          <h1 class="hero-title" id="taskTitle">任务标题</h1>
          <div class="hero-desc" id="taskDesc">任务说明</div>
          <div class="task-strip">
            <span class="task-state-chip" id="taskStateChip">Idle</span>
            <span class="task-duration" id="taskDuration">耗时 00:00</span>
          </div>
        </div>
        <div class="hero-tags" id="taskTags"></div>
      </section>

      <section class="form-card">
        <div class="form-grid" id="taskForm"></div>
        <div class="divider"></div>
        <div class="action-row">
          <button type="button" class="btn btn-primary" id="runBtn">开始执行</button>
          <button type="button" class="btn btn-ghost" id="clearBtn">清空日志</button>
          <span class="helper" id="modeHint">当前模式：安全复制</span>
        </div>
      </section>

      <section class="preview-card">
        <div class="preview-head">
          <h2>路径预览</h2>
          <div class="preview-summary" id="previewSummary">选择路径后自动展示扩展名统计。</div>
        </div>
        <div class="preview-toggle" id="previewToggle">
          <div class="preview-toggle-bar" id="previewToggleBar">
            <span class="preview-toggle-arrow" id="previewArrow">▾</span>
            <span class="preview-toggle-label" id="previewToggleLabel">展开详情</span>
          </div>
        </div>
        <div class="preview-grid-wrapper" id="previewGridWrapper">
          <div class="preview-grid" id="previewBox">
            <div class="preview-empty">暂无预览数据。选择路径后会自动统计文件数量并展示前 20 个样本。</div>
          </div>
        </div>
      </section>

      <section class="log-card">
        <div class="log-head">
          <h2>实时日志</h2>
          <div class="helper" id="logHint">日志会在执行时自动刷新</div>
        </div>
        <div class="log-box" id="logBox" aria-live="polite"></div>
      </section>

      <section class="result-card">
        <div class="result-head">
          <h2>执行结果</h2>
          <div class="helper" id="resultSummary">等待任务完成后展示输出路径与备份路径</div>
        </div>

        <div class="metric-grid">
          <div class="metric"><div class="k">成功数</div><div class="v" id="metricSuccess">0</div></div>
          <div class="metric"><div class="k">失败数</div><div class="v" id="metricFail">0</div></div>
          <div class="metric"><div class="k">跳过数</div><div class="v" id="metricSkip">0</div></div>
          <div class="metric"><div class="k">任务状态</div><div class="v" id="metricStatus" style="font-size: 16px;">idle</div></div>
        </div>

        <div class="result-paths">
          <div class="result-path">
            <div class="k">输出目录</div>
            <div class="v" id="outputPathText">-</div>
          </div>
          <div class="result-path">
            <div class="k">备份目录</div>
            <div class="v" id="backupPathText">-</div>
          </div>
        </div>

        <div class="result-footer">
          <div class="action-row" style="padding-top: 0;">
            <button type="button" class="btn btn-secondary" id="openOutputBtn" disabled>打开输出目录</button>
            <button type="button" class="btn btn-secondary" id="openBackupBtn" disabled>打开备份目录</button>
          </div>
          <div class="footer-note" id="resultErrorText">未发现错误</div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal-card">
      <h3 class="modal-title" id="confirmTitle">确认原地修改</h3>
      <p class="modal-desc" id="confirmDesc">你即将执行原地修改，系统会先备份后再写入原目录。</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="confirmCancelBtn">取消</button>
        <button type="button" class="btn btn-primary" id="confirmOkBtn">确认执行</button>
      </div>
    </div>
  </div>

  <script>
    const TASKS = {
      bgr2rgb: {
        title: "颜色通道转换",
        subtitle: "RGB -> BGR 批量",
        desc: "调用 `bgr2rgb.py` 对图片进行批量颜色通道转换，支持双向转换与两种执行模式。",
        badge: "图像",
        icon: "🎨",
        supportsInputMode: true,
        paths: [
          { key: "input_dir", label: "输入目录", hint: "待处理图片所在目录", placeholder: "选择包含图片的文件夹", required: true },
          { key: "output_dir", label: "输出目录", hint: "安全复制模式下写入此目录", placeholder: "选择输出目录", required: true, safeOnly: true }
        ],
        params: [
          { key: "color_direction", label: "转换方向", hint: "RGB -> BGR 或 BGR -> RGB", type: "radio", required: true, default: "rgb_to_bgr", options: [ { label: "RGB -> BGR", value: "rgb_to_bgr" }, { label: "BGR -> RGB", value: "bgr_to_rgb" } ] }
        ]
      },
      rename2: {
        title: "批量重命名",
        subtitle: "图片 + JSON 前缀",
        desc: "调用 `rename2.py` 为图片及关联 JSON 文件统一添加前缀，保持文件配对关系。",
        badge: "重命名",
        icon: "📝",
        paths: [
          { key: "source_dir", label: "源目录", hint: "包含图片和 JSON 的文件夹", placeholder: "选择源目录", required: true },
          { key: "target_dir", label: "目标目录", hint: "安全复制模式下的输出目录", placeholder: "选择目标目录", required: true, safeOnly: true }
        ],
        params: [
          { key: "prefix", label: "文件前缀", hint: "例如 `new_`、`2024_`", placeholder: "请输入前缀", required: true, type: "text" }
        ]
      },
      select_diverse: {
        title: "多样性筛图",
        subtitle: "pHash 去重筛选",
        desc: "调用 `select_diverse.py` 从 PNG 图片中按比例或张数筛出更有场景差异的图片。",
        badge: "筛选",
        icon: "🔍",
        supportsInputMode: true,
        paths: [
          { key: "input_dir", label: "输入目录", hint: "包含 PNG 图片的文件夹", placeholder: "选择输入目录", required: true },
          { key: "output_dir", label: "输出目录", hint: "安全复制模式下写入此目录", placeholder: "选择输出目录", required: true, safeOnly: true }
        ],
        params: [
          { key: "target_count", label: "筛选张数", hint: "填写后优先于比例", placeholder: "", required: false, type: "number", step: "1", min: "1" },
          { key: "select_ratio", label: "精选比例", hint: "范围 0.01 - 1.00", placeholder: "0.1", required: false, type: "number", step: "0.01", min: "0.01", max: "1", default: 0.1 },
          { key: "hamming_thresh", label: "汉明阈值", hint: "越大越宽松，建议 8 - 15", placeholder: "10", required: true, type: "number", step: "1", min: "0", default: 10 }
        ]
      },
      json_path: {
        title: "JSON 路径修复",
        subtitle: "imagePath 批量修复",
        desc: "调用 `更改json路径.py`，根据同名图片批量修复 JSON 中的 `imagePath` 字段。",
        badge: "JSON",
        icon: "📋",
        paths: [
          { key: "json_dir", label: "JSON 目录", hint: "待修复的 JSON 文件夹", placeholder: "选择 JSON 目录", required: true },
          { key: "image_dir", label: "图片目录", hint: "用于匹配文件名的图片目录", placeholder: "选择图片目录", required: true },
          { key: "output_dir", label: "输出目录", hint: "安全复制模式下复制 JSON 后再修复", placeholder: "选择输出目录", required: true, safeOnly: true }
        ],
        params: []
      }
    };

    const state = {
      activeTask: "bgr2rgb",
      mode: "safe_copy",
      running: false,
      runStartedAt: 0,
      elapsedTimer: null,
      taskId: "",
      pollTimer: null,
      pollToken: 0,
      logIndex: 0,
      latestOutputPath: "",
      latestBackupPath: "",
      latestError: "",
      previewTimer: null,
      previewToken: 0,
      previewLoading: false,
      previewData: null,
      previewError: "",
      previewExpanded: false,
      sidebarCollapsed: false,
      formData: {}
    };

    const $ = (id) => document.getElementById(id);
    const hasApi = () => Boolean(window.pywebview && window.pywebview.api);

    function ensureTaskState(taskKey) {
      if (!state.formData[taskKey]) state.formData[taskKey] = { paths: {}, params: {}, backup_dir: "", input_mode: "folder" };
      const task = TASKS[taskKey];
      task.params.forEach((param) => {
        if (state.formData[taskKey].params[param.key] === undefined && param.default !== undefined) {
          state.formData[taskKey].params[param.key] = param.default;
        }
      });
      if (task.supportsInputMode && !state.formData[taskKey].input_mode) {
        state.formData[taskKey].input_mode = "folder";
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) { return escapeHtml(value); }
    function cssEscape(value) {
      if (window.CSS && typeof CSS.escape === "function") return CSS.escape(value);
      return String(value).replace(/"/g, '\\"');
    }

    function truncatePath(path) {
      const value = String(path || "");
      if (value.length <= 56) return value;
      return `${value.slice(0, 24)}...${value.slice(-24)}`;
    }

    function formatDuration(totalSeconds) {
      const sec = Math.max(0, Number(totalSeconds || 0));
      const mm = String(Math.floor(sec / 60)).padStart(2, "0");
      const ss = String(sec % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function renderDuration() {
      if (!state.runStartedAt) {
        $("taskDuration").textContent = "耗时 00:00";
        return;
      }
      const elapsedSec = Math.floor((Date.now() - state.runStartedAt) / 1000);
      $("taskDuration").textContent = `耗时 ${formatDuration(elapsedSec)}`;
    }

    function startElapsedTicker() {
      stopElapsedTicker();
      renderDuration();
      state.elapsedTimer = window.setInterval(renderDuration, 1000);
    }

    function stopElapsedTicker() {
      if (state.elapsedTimer) {
        window.clearInterval(state.elapsedTimer);
        state.elapsedTimer = null;
      }
    }

    function toggleSidebar() {
      state.sidebarCollapsed = !state.sidebarCollapsed;
      document.getElementById("shellRoot").classList.toggle("sidebar-collapsed", state.sidebarCollapsed);
    }

    function renderNav() {
      const nav = $("taskNav");
      nav.innerHTML = "";
      Object.entries(TASKS).forEach(([taskKey, task]) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `nav-btn${state.activeTask === taskKey ? " active" : ""}`;
        btn.disabled = state.running;
        btn.innerHTML = `
          <span class="nav-icon">${escapeHtml(task.icon || "📄")}</span>
          <div class="nav-content">
            <div class="nav-info">
              <div class="nav-title">${escapeHtml(task.title)}</div>
              <div class="nav-desc">${escapeHtml(task.subtitle)}</div>
            </div>
            <span class="chip nav-badge">${escapeHtml(task.badge)}</span>
          </div>
        `;
        btn.addEventListener("click", () => {
          if (state.running || state.activeTask === taskKey) return;
          persistCurrentForm();
          state.activeTask = taskKey;
          renderAll();
        });
        nav.appendChild(btn);
      });
    }

    function renderMode() {
      document.querySelectorAll(".mode-option").forEach((option) => {
        const input = option.querySelector('input[name="mode"]');
        option.classList.toggle("active", input && input.value === state.mode);
      });
      $("modeChip").textContent = state.mode === "safe_copy" ? "安全" : "原地";
      $("modeHint").textContent = state.mode === "safe_copy" ? "当前模式：安全复制" : "当前模式：原地修改";
    }

    function renderTask() {
      const task = TASKS[state.activeTask];
      $("taskTitle").textContent = task.title;
      $("taskDesc").textContent = task.desc;
      const taskState = state.formData[state.activeTask] || {};
      const chips = [];
      if (task.supportsInputMode) {
        chips.push(`<span class="chip">${taskState.input_mode === "file" ? "单文件" : "文件夹"}</span>`);
      }
      chips.push(`<span class="chip">${state.mode === "safe_copy" ? "安全复制" : "原地修改"}</span>`);
      $("taskTags").innerHTML = chips.join("");
    }

    function getInputMode(taskState) {
      return taskState.input_mode === "file" ? "file" : "folder";
    }

    function getPrimaryPathMeta(task, taskState, item) {
      if (!task.supportsInputMode || item.key !== "input_dir") {
        return { label: item.label, hint: item.hint, placeholder: item.placeholder || "", actionLabel: "选择目录" };
      }
      const inputMode = getInputMode(taskState);
      if (inputMode === "file") {
        return { label: "输入文件", hint: "选择单个图片文件", placeholder: "选择单个图片文件", actionLabel: "选择文件" };
      }
      return { label: "输入目录", hint: "选择包含图片的文件夹", placeholder: "选择包含图片的文件夹", actionLabel: "选择目录" };
    }

    function renderInputModeSection(taskState) {
      return `
        <section class="form-section">
          <div class="form-section-head">
            <div>
              <h2>输入模式</h2>
              <p>图像类任务支持文件夹/单文件两种输入方式。</p>
            </div>
          </div>
          <div class="mode-group">
            <label class="mode-option ${getInputMode(taskState) === "folder" ? "active" : ""}">
              <input type="radio" name="input_mode" value="folder" ${getInputMode(taskState) === "folder" ? "checked" : ""} ${state.running ? "disabled" : ""} />
              <div class="mode-label">
                <strong>文件夹</strong>
                <span>按目录批量处理，适合一次处理多张图片。</span>
              </div>
            </label>
            <label class="mode-option ${getInputMode(taskState) === "file" ? "active" : ""}">
              <input type="radio" name="input_mode" value="file" ${getInputMode(taskState) === "file" ? "checked" : ""} ${state.running ? "disabled" : ""} />
              <div class="mode-label">
                <strong>单文件</strong>
                <span>对单个图片文件执行，适合快速预览。</span>
              </div>
            </label>
          </div>
        </section>
      `;
    }

    function renderPathRow(taskKey, taskState, item) {
      const task = TASKS[taskKey];
      const current = taskState.paths[item.key] || "";
      const meta = getPrimaryPathMeta(task, taskState, item);
      return `
        <div class="field-row">
          <div class="field-label">
            <strong>${escapeHtml(meta.label)}</strong>
            <span>${escapeHtml(meta.hint)}</span>
          </div>
          <input class="input" type="text" data-kind="path" data-key="${escapeAttr(item.key)}" placeholder="${escapeAttr(meta.placeholder)}" value="${escapeAttr(current)}" ${state.running ? "disabled" : ""} />
          <button type="button" class="btn btn-ghost" data-browse="${escapeAttr(item.key)}" data-browse-kind="${task.supportsInputMode && item.key === "input_dir" ? (getInputMode(taskState) === "file" ? "file" : "folder") : "folder"}" ${state.running ? "disabled" : ""}>${escapeHtml(meta.actionLabel)}</button>
        </div>
      `;
    }

    function renderParamRow(taskState, item) {
      const current = taskState.params[item.key] ?? item.default ?? "";
      if (item.type === "radio") {
        return `
          <div class="field-row" style="grid-template-columns: 140px minmax(0, 1fr) auto;">
            <div class="field-label">
              <strong>${escapeHtml(item.label)}</strong>
              <span>${escapeHtml(item.hint)}</span>
            </div>
            <div class="mode-group" style="grid-column: 2 / 4;">
              ${item.options.map((option) => `
                <label class="mode-option ${current === option.value ? "active" : ""}">
                  <input type="radio" name="${escapeAttr(item.key)}" value="${escapeAttr(option.value)}" ${current === option.value ? "checked" : ""} ${state.running ? "disabled" : ""} />
                  <div class="mode-label">
                    <strong>${escapeHtml(option.label)}</strong>
                    <span>${escapeHtml(option.value)}</span>
                  </div>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }
      const numericType = item.type === "number" ? "number" : "text";
      return `
        <div class="field-row param">
          <div class="field-label">
            <strong>${escapeHtml(item.label)}</strong>
            <span>${escapeHtml(item.hint)}</span>
          </div>
          <input class="input" type="${numericType}" data-kind="param" data-key="${escapeAttr(item.key)}" placeholder="${escapeAttr(item.placeholder || "")}" value="${escapeAttr(String(current))}" ${item.step !== undefined ? `step="${escapeAttr(item.step)}"` : ""} ${item.min !== undefined ? `min="${escapeAttr(item.min)}"` : ""} ${item.max !== undefined ? `max="${escapeAttr(item.max)}"` : ""} ${state.running ? "disabled" : ""} />
          <div class="helper">${escapeHtml(item.hint || "按需填写")}</div>
        </div>
      `;
    }

    function renderBackupRow(taskState) {
      const current = taskState.backup_dir || "";
      return `
        <div class="field-row">
          <div class="field-label">
            <strong>备份目录</strong>
            <span>原地修改时必填，建议选择独立目录。</span>
          </div>
          <input class="input" type="text" data-kind="backup" data-key="backup_dir" placeholder="选择备份目录" value="${escapeAttr(current)}" ${state.running ? "disabled" : ""} />
          <button type="button" class="btn btn-ghost" data-browse="backup_dir" ${state.running ? "disabled" : ""}>选择目录</button>
        </div>
      `;
    }

    function normalizeTextValue(value) {
      return String(value ?? "").trim();
    }

    function buildCurrentTaskPayload(taskKey = state.activeTask, options = {}) {
      ensureTaskState(taskKey);
      const task = TASKS[taskKey];
      const taskState = state.formData[taskKey];
      const forPreview = Boolean(options.forPreview);
      const paths = {};
      const params = {};

      for (const field of task.paths) {
        if (forPreview && field.safeOnly) continue;
        const value = normalizeTextValue(taskState.paths[field.key]);
        if (value) paths[field.key] = value;
      }

      for (const field of task.params) {
        const raw = taskState.params[field.key];
        const value = normalizeTextValue(raw);
        if (!value) continue;
        if (field.type === "number") {
          const num = Number(value);
          if (!Number.isNaN(num)) params[field.key] = num;
        } else {
          params[field.key] = value;
        }
      }

      if (task.supportsInputMode) {
        paths.input_mode = getInputMode(taskState);
        if (paths.input_mode === "file") {
          const filePath = normalizeTextValue(taskState.paths.input_dir);
          if (filePath) paths.input_path = filePath;
        }
      }

      const backup_dir = normalizeTextValue(taskState.backup_dir);
      return { task: taskKey, mode: state.mode, paths, params, backup_dir };
    }

    function hasPreviewTarget(payload) {
      const pathValues = Object.values(payload.paths || {}).filter((value) => normalizeTextValue(value));
      return pathValues.length > 0;
    }

    function clearPreviewTimer() {
      if (state.previewTimer) {
        window.clearTimeout(state.previewTimer);
        state.previewTimer = null;
      }
    }

    function setPreviewState({ loading = false, data = null, error = "" } = {}) {
      state.previewLoading = loading;
      state.previewData = data;
      state.previewError = error;
      renderPreview();
    }

    function normalizePreviewCountEntries(counts) {
      if (!counts) return [];
      if (Array.isArray(counts)) {
        return counts.map((entry) => {
          if (entry && typeof entry === "object") {
            const label = entry.ext ?? entry.extension ?? entry.label ?? entry.name ?? entry.key ?? entry.type ?? "";
            const count = Number(entry.count ?? entry.value ?? entry.total ?? 0);
            return { label: normalizeTextValue(label), count: Number.isFinite(count) ? count : 0 };
          }
          if (Array.isArray(entry) && entry.length >= 2) {
            const [label, count] = entry;
            return { label: normalizeTextValue(label), count: Number(count) || 0 };
          }
          return null;
        }).filter(Boolean);
      }
      if (typeof counts === "object") {
        return Object.entries(counts).map(([label, count]) => ({ label: normalizeTextValue(label), count: Number(count) || 0 }));
      }
      return [];
    }

    function normalizePreviewSamples(samples) {
      if (!samples) return [];
      if (Array.isArray(samples)) {
        return samples.map((entry) => {
          if (typeof entry === "string") return normalizeTextValue(entry);
          if (entry && typeof entry === "object") {
            const value = entry.display ?? entry.path ?? entry.name ?? entry.file ?? entry.text ?? entry.label ?? "";
            return normalizeTextValue(value);
          }
          return normalizeTextValue(entry);
        }).filter(Boolean).slice(0, 20);
      }
      if (typeof samples === "object") {
        return Object.values(samples).map((value) => normalizeTextValue(value)).filter(Boolean).slice(0, 20);
      }
      return [];
    }

    function normalizePreviewSections(response) {
      const source = response && typeof response === "object" && (response.data || response.result || response.payload || response.preview)
        ? (response.data || response.result || response.payload || response.preview)
        : response;
      const rawSections = Array.isArray(source?.sections) && source.sections.length ? source.sections : [source];
      return rawSections.filter(Boolean).map((section, index) => {
        const title = normalizeTextValue(section.title || section.name || section.label || section.path_label || `预览 ${index + 1}`);
        const path = normalizeTextValue(section.path || section.dir || section.directory || section.input_path || section.target_path || "");
        const totalFiles = Number(section.total_files ?? section.total ?? section.count ?? section.file_count ?? 0) || 0;
        const counts = normalizePreviewCountEntries(section.counts_by_ext || section.counts || section.extensions || section.ext_counts || section.extCount || section.summary);
        const samples = normalizePreviewSamples(section.sample_files || section.samples || section.files || section.items || section.preview_files);
        const error = normalizeTextValue(section.error || "");
        return { title, path, totalFiles, counts, samples, error };
      });
    }

    function formatPreviewSummary(sections) {
      const totalFiles = sections.reduce((sum, section) => sum + (Number(section.totalFiles) || 0), 0);
      const totalKinds = new Set();
      let sampleCount = 0;
      sections.forEach((section) => {
        section.counts.forEach((item) => {
          if (item.label) totalKinds.add(item.label);
        });
        sampleCount += section.samples.length;
      });
      if (!sections.length) return { short: "暂无预览数据", full: "暂无预览数据" };
      const extCount = totalKinds.size || sections.length;
      if (totalFiles > 0) {
        return { short: `共 ${totalFiles} 个文件，${extCount} 类扩展名`, full: `共 ${totalFiles} 个文件，${extCount} 类扩展名，展示前 ${Math.min(sampleCount || 20, 20)} 个样本` };
      }
      return { short: `已返回 ${sections.length} 个预览块`, full: `已返回 ${sections.length} 个预览块，展示前 ${Math.min(sampleCount || 20, 20)} 个样本` };
    }

    function renderPreview() {
      const summaryBox = $("previewSummary");
      const previewBox = $("previewBox");
      const toggle = $("previewToggle");
      const arrow = $("previewArrow");
      const label = $("previewToggleLabel");
      const gridWrapper = $("previewGridWrapper");
      if (!summaryBox || !previewBox) return;

      if (state.previewLoading) {
        summaryBox.textContent = "正在刷新路径预览…";
        previewBox.innerHTML = `<div class="preview-empty">预览请求已发出，正在读取文件统计，请稍候。</div>`;
        toggle.classList.remove("has-data");
        return;
      }

      if (state.previewError) {
        summaryBox.textContent = "预览失败";
        previewBox.innerHTML = `<div class="preview-empty">${escapeHtml(state.previewError)}</div>`;
        toggle.classList.remove("has-data");
        return;
      }

      if (!state.previewData) {
        summaryBox.textContent = "选择路径后自动展示扩展名统计。";
        previewBox.innerHTML = `<div class="preview-empty">暂无预览数据。选择路径后会自动统计文件数量并展示前 20 个样本。</div>`;
        toggle.classList.remove("has-data");
        gridWrapper.classList.remove("expanded");
        return;
      }

      const sections = normalizePreviewSections(state.previewData);
      if (!sections.length) {
        summaryBox.textContent = "暂无预览数据";
        previewBox.innerHTML = `<div class="preview-empty">后端已返回结果，但当前没有可展示的路径统计。</div>`;
        toggle.classList.remove("has-data");
        return;
      }

      const summary = formatPreviewSummary(sections);
      summaryBox.textContent = summary.short;
      toggle.classList.add("has-data");

      if (state.previewExpanded) {
        arrow.classList.add("expanded");
        label.textContent = "收起详情";
        gridWrapper.classList.add("expanded");
      } else {
        arrow.classList.remove("expanded");
        label.textContent = "展开详情";
        gridWrapper.classList.remove("expanded");
      }

      previewBox.innerHTML = sections.map((section) => {
        const countsHtml = section.counts.length
          ? section.counts.map((item) => `<span class="preview-count-chip">${escapeHtml(item.label || "unknown")} · ${Number(item.count) || 0}</span>`).join("")
          : `<span class="preview-empty" style="display:inline-flex;align-items:center;min-height:0;">暂无扩展名统计</span>`;
        const sampleHtml = section.samples.length
          ? section.samples.map((sample) => `<span class="preview-sample" title="${escapeAttr(sample)}">${escapeHtml(sample)}</span>`).join("")
          : `<span class="preview-empty" style="display:inline-flex;align-items:center;min-height:0;">暂无样本文件</span>`;
        return `
          <article class="preview-block">
            <div class="preview-block-head">
              <div class="preview-block-title">${escapeHtml(section.title)}</div>
              ${section.path ? `<div class="helper" title="${escapeAttr(section.path)}">${escapeHtml(truncatePath(section.path))}</div>` : ""}
            </div>
            <div class="preview-counts">${countsHtml}</div>
            <div class="preview-samples">${sampleHtml}</div>
            ${section.error ? `<div class="helper" style="color: var(--danger);">${escapeHtml(section.error)}</div>` : ""}
          </article>
        `;
      }).join("");
    }

    async function requestPreview() {
      clearPreviewTimer();
      const payload = buildCurrentTaskPayload(state.activeTask, { forPreview: true });
      if (!hasPreviewTarget(payload)) {
        setPreviewState({ loading: false, data: null, error: "" });
        return;
      }
      const api = hasApi() ? window.pywebview.api : null;
      if (!api || typeof api.preview_path !== "function") {
        setPreviewState({ loading: false, data: null, error: "预览接口尚未连接，请先通过 Python 主程序启动应用。"});
        return;
      }
      const token = ++state.previewToken;
      setPreviewState({ loading: true, data: null, error: "" });
      try {
        const response = await api.preview_path(payload);
        if (token !== state.previewToken) return;
        if (response && response.ok === false) throw new Error(response.error || "路径预览失败");
        state.previewLoading = false;
        state.previewError = "";
        state.previewData = response || null;
        renderPreview();
      } catch (error) {
        if (token !== state.previewToken) return;
        setPreviewState({ loading: false, data: null, error: error?.message || String(error) });
      }
    }

    function schedulePreview() {
      clearPreviewTimer();
      state.previewTimer = window.setTimeout(() => {
        state.previewTimer = null;
        requestPreview();
      }, 280);
    }

    function setInputMode(mode) {
      const taskState = state.formData[state.activeTask];
      taskState.input_mode = mode === "file" ? "file" : "folder";
      renderTask();
      renderForm();
      schedulePreview();
    }

    function renderForm() {
      ensureTaskState(state.activeTask);
      const task = TASKS[state.activeTask];
      const taskState = state.formData[state.activeTask];
      const sections = [];
      if (task.supportsInputMode) sections.push(renderInputModeSection(taskState));
      sections.push(`
        <section class="form-section">
          <div class="form-section-head">
            <div>
              <h2>路径输入</h2>
              <p>选择任务所需的目录，路径越清晰，执行越稳定。</p>
            </div>
          </div>
          <div class="field-grid">
            ${task.paths.filter((item) => !(item.safeOnly && state.mode === "in_place")).map((item) => renderPathRow(state.activeTask, taskState, item)).join("")}
          </div>
        </section>
      `);
      if (task.params.length > 0) {
        sections.push(`
          <section class="form-section">
            <div class="form-section-head">
              <div>
                <h2>参数设置</h2>
                <p>参数校验会在执行前进行，避免跑到一半才发现问题。</p>
              </div>
            </div>
            <div class="field-grid">${task.params.map((item) => renderParamRow(taskState, item)).join("")}</div>
          </section>
        `);
      }
      if (state.mode === "in_place") {
        sections.push(`
          <section class="form-section">
            <div class="form-section-head">
              <div>
                <h2>备份设置</h2>
                <p>原地修改时必须先备份，防止误操作覆盖源文件。</p>
              </div>
            </div>
            <div class="field-grid">${renderBackupRow(taskState)}</div>
          </section>
        `);
      }
      $("taskForm").innerHTML = sections.join("");
      bindDynamicInputs();
      schedulePreview();
    }

    function bindDynamicInputs() {
      document.querySelectorAll('input[data-kind="path"]').forEach((input) => input.addEventListener("input", onFormInput));
      document.querySelectorAll('input[data-kind="param"]').forEach((input) => input.addEventListener("input", onFormInput));
      const backupInput = document.querySelector('input[data-kind="backup"]');
      if (backupInput) backupInput.addEventListener("input", onFormInput);
      document.querySelectorAll('input[name="input_mode"]').forEach((input) => input.addEventListener("change", onInputModeChange));
      document.querySelectorAll('input[name="color_direction"]').forEach((input) => input.addEventListener("change", onParamRadioChange));
      document.querySelectorAll("button[data-browse]").forEach((btn) => btn.addEventListener("click", onBrowseClick));
    }

    function onFormInput(event) {
      const target = event.currentTarget;
      const taskState = state.formData[state.activeTask];
      const key = target.dataset.key;
      if (target.dataset.kind === "path") taskState.paths[key] = target.value;
      else if (target.dataset.kind === "param") taskState.params[key] = target.value;
      else if (target.dataset.kind === "backup") taskState.backup_dir = target.value;
      schedulePreview();
    }

    function onInputModeChange(event) {
      if (state.running) return;
      const mode = event.currentTarget.value === "file" ? "file" : "folder";
      setInputMode(mode);
    }

    function onParamRadioChange(event) {
      if (state.running) return;
      const input = event.currentTarget;
      const taskState = state.formData[state.activeTask];
      taskState.params[input.name] = input.value;
      renderTask();
      schedulePreview();
    }

    async function onBrowseClick(event) {
      event.preventDefault();
      if (state.running) return;
      const button = event.currentTarget;
      const key = button.dataset.browse;
      const browseKind = button.dataset.browseKind || "folder";
      const path = browseKind === "file" ? await chooseFile() : await chooseFolder();
      if (!path) return;
      const taskState = state.formData[state.activeTask];
      if (key === "backup_dir") {
        taskState.backup_dir = path;
        const backupInput = document.querySelector('input[data-kind="backup"]');
        if (backupInput) backupInput.value = path;
      } else {
        taskState.paths[key] = path;
        const input = document.querySelector(`input[data-kind="path"][data-key="${cssEscape(key)}"]`);
        if (input) input.value = path;
      }
      schedulePreview();
    }

    function persistCurrentForm() {
      const currentTaskState = state.formData[state.activeTask];
      document.querySelectorAll('input[data-kind="path"]').forEach((input) => { currentTaskState.paths[input.dataset.key] = input.value; });
      document.querySelectorAll('input[data-kind="param"]').forEach((input) => { currentTaskState.params[input.dataset.key] = input.value; });
      const backupInput = document.querySelector('input[data-kind="backup"]');
      if (backupInput) currentTaskState.backup_dir = backupInput.value;
      const inputMode = document.querySelector('input[name="input_mode"]:checked');
      if (inputMode) currentTaskState.input_mode = inputMode.value === "file" ? "file" : "folder";
      const colorDirection = document.querySelector('input[name="color_direction"]:checked');
      if (colorDirection) currentTaskState.params.color_direction = colorDirection.value;
    }

    function setMode(mode) {
      state.mode = mode;
      persistCurrentForm();
      renderMode();
      renderTask();
      renderForm();
      syncRunningState();
      schedulePreview();
    }

    function setStatus(status, message) {
      const dot = $("statusDot");
      const badge = $("statusBadge");
      const text = $("statusText");
      const taskChip = $("taskStateChip");
      dot.className = "status-dot";
      taskChip.className = "task-state-chip";
      if (status === "running") {
        dot.classList.add("running");
        badge.textContent = "Running";
        taskChip.classList.add("running");
        taskChip.textContent = "Running";
      } else if (status === "success") {
        dot.classList.add("success");
        badge.textContent = "Success";
        taskChip.classList.add("success");
        taskChip.textContent = "Success";
      } else if (status === "fail") {
        dot.classList.add("fail");
        badge.textContent = "Failed";
        taskChip.classList.add("fail");
        taskChip.textContent = "Failed";
      } else {
        badge.textContent = "Idle";
        taskChip.textContent = "Idle";
      }
      text.textContent = message || "已就绪，等待选择功能并填写参数。";
      $("metricStatus").textContent = status || "idle";
    }

    function syncRunningState() {
      document.body.classList.toggle("is-running", state.running);
      $("runBtn").disabled = state.running;
      $("clearBtn").disabled = state.running;
      $("openOutputBtn").disabled = state.running || !state.latestOutputPath;
      $("openBackupBtn").disabled = state.running || !state.latestBackupPath;
      document.querySelectorAll("#taskNav .nav-btn").forEach((btn) => { btn.disabled = state.running; });
      document.querySelectorAll('input[name="mode"]').forEach((radio) => { radio.disabled = state.running; });
      document.querySelectorAll('.mode-option').forEach((option) => {
        const input = option.querySelector('input[name="mode"]');
        option.classList.toggle("active", input && input.value === state.mode);
      });
    }

    async function chooseFolder() {
      const api = hasApi() ? window.pywebview.api : null;
      if (!api || typeof api.select_folder !== "function") {
        appendLog("warn", "当前环境未连接到 pywebview，目录选择不可用。");
        return "";
      }
      try { return await api.select_folder(); }
      catch (error) { appendLog("error", `目录选择失败: ${error?.message || error}`); return ""; }
    }

    async function chooseFile() {
      const api = hasApi() ? window.pywebview.api : null;
      if (!api || typeof api.select_file !== "function") {
        appendLog("warn", "当前环境未连接到 pywebview，文件选择不可用。");
        return "";
      }
      try { return await api.select_file(); }
      catch (error) { appendLog("error", `文件选择失败: ${error?.message || error}`); return ""; }
    }

    function confirmInPlaceExecution(backupDir) {
      const modal = $("confirmModal");
      const desc = $("confirmDesc");
      const okBtn = $("confirmOkBtn");
      const cancelBtn = $("confirmCancelBtn");
      desc.textContent = `你将执行原地修改。系统会先备份到：${backupDir || "（未填写）"}。确认继续？`;
      modal.classList.remove("hidden");
      return new Promise((resolve) => {
        const onCancel = () => { cleanup(); resolve(false); };
        const onOk = () => { cleanup(); resolve(true); };
        const onEsc = (event) => { if (event.key === "Escape") { cleanup(); resolve(false); } };
        const cleanup = () => {
          modal.classList.add("hidden");
          okBtn.removeEventListener("click", onOk);
          cancelBtn.removeEventListener("click", onCancel);
          modal.removeEventListener("click", onBackdrop);
          document.removeEventListener("keydown", onEsc);
        };
        const onBackdrop = (event) => { if (event.target === modal) onCancel(); };
        okBtn.addEventListener("click", onOk);
        cancelBtn.addEventListener("click", onCancel);
        modal.addEventListener("click", onBackdrop);
        document.addEventListener("keydown", onEsc);
      });
    }

    function validatePayload(taskKey) {
      ensureTaskState(taskKey);
      const task = TASKS[taskKey];
      const taskState = state.formData[taskKey];
      const paths = {};
      const params = {};

      for (const field of task.paths) {
        if (field.safeOnly && state.mode === "in_place") continue;
        const value = String(taskState.paths[field.key] || "").trim();
        if (field.required && !value) throw new Error(`请填写 ${field.label}`);
        paths[field.key] = value;
      }

      if (task.supportsInputMode) {
        paths.input_mode = getInputMode(taskState);
        if (paths.input_mode === "file") {
          const filePath = String(taskState.paths.input_dir || "").trim();
          if (!filePath) throw new Error("请先选择单文件输入路径");
          paths.input_path = filePath;
        }
      }

      for (const field of task.params) {
        const raw = taskState.params[field.key];
        const value = String(raw ?? "").trim();
        if (!value) {
          if (field.required) throw new Error(`请填写 ${field.label}`);
          if (field.default !== undefined && field.key !== "target_count") params[field.key] = field.default;
          continue;
        }
        if (field.type === "number") {
          const num = Number(value);
          if (Number.isNaN(num)) throw new Error(`${field.label} 必须是数字`);
          if (field.min !== undefined && num < Number(field.min)) throw new Error(`${field.label} 不能小于 ${field.min}`);
          if (field.max !== undefined && num > Number(field.max)) throw new Error(`${field.label} 不能大于 ${field.max}`);
          params[field.key] = num;
        } else {
          params[field.key] = value;
        }
      }

      const backupDir = String(taskState.backup_dir || "").trim();
      if (state.mode === "in_place" && !backupDir) throw new Error("原地修改模式必须填写备份目录");
      return { task: taskKey, mode: state.mode, paths, params, backup_dir: backupDir };
    }

    function clearLogs() { $("logBox").innerHTML = ""; }
    function appendLog(level, text) {
      const box = $("logBox");
      const line = document.createElement("div");
      line.className = `log-line log-${level}`;
      line.textContent = text;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function clearResult() {
      $("metricSuccess").textContent = "0";
      $("metricFail").textContent = "0";
      $("metricSkip").textContent = "0";
      $("metricStatus").textContent = "idle";
      $("outputPathText").textContent = "-";
      $("backupPathText").textContent = "-";
      $("resultSummary").textContent = "等待任务完成后展示输出路径与备份路径";
      $("resultErrorText").textContent = "未发现错误";
      $("openOutputBtn").disabled = true;
      $("openBackupBtn").disabled = true;
      state.latestOutputPath = "";
      state.latestBackupPath = "";
      state.latestError = "";
      state.runStartedAt = 0;
      stopElapsedTicker();
      renderDuration();
    }

    function updateResult(status) {
      $("metricSuccess").textContent = String(status.success_count ?? 0);
      $("metricFail").textContent = String(status.fail_count ?? 0);
      $("metricSkip").textContent = String(status.skipped_count ?? 0);
      $("metricStatus").textContent = String(status.status || "unknown");
      state.latestOutputPath = status.output_path || "";
      state.latestBackupPath = status.backup_path || "";
      state.latestError = status.error || "";
      $("outputPathText").textContent = state.latestOutputPath || "-";
      $("backupPathText").textContent = state.latestBackupPath || "-";
      $("resultSummary").textContent = state.latestOutputPath ? `输出已生成到 ${truncatePath(state.latestOutputPath)}` : "执行结果尚未产生输出路径";
      $("resultErrorText").textContent = state.latestError ? state.latestError : "未发现错误";
      $("openOutputBtn").disabled = !state.latestOutputPath;
      $("openBackupBtn").disabled = !state.latestBackupPath;
    }

    async function openPath(path) {
      const api = hasApi() ? window.pywebview.api : null;
      if (!api || typeof api.open_path !== "function") return;
      try { await api.open_path(path); } catch (error) { appendLog("error", `打开路径失败: ${error?.message || error}`); }
    }

    function parseLogLine(line) {
      const raw = String(line || "");
      const match = raw.match(/^\[[^\]]+\]\s+\[([A-Z]+)\]\s+(.*)$/);
      if (!match) return { level: "info", text: raw };
      const level = match[1].toLowerCase();
      return { level: level === "error" || level === "warn" ? level : "info", text: match[2] };
    }

    function bindPreviewToggle() {
      const toggleBar = $("previewToggleBar");
      if (toggleBar) {
        toggleBar.addEventListener("click", () => {
          if (!state.previewData) return;
          state.previewExpanded = !state.previewExpanded;
          renderPreview();
        });
      }
    }

    function bindGlobalEvents() {
      $("runBtn").addEventListener("click", runTask);
      $("clearBtn").addEventListener("click", () => {
        if (state.running) return;
        clearLogs();
        appendLog("info", "日志已清空。");
      });
      $("openOutputBtn").addEventListener("click", () => { if (state.latestOutputPath) openPath(state.latestOutputPath); });
      $("openBackupBtn").addEventListener("click", () => { if (state.latestBackupPath) openPath(state.latestBackupPath); });
      document.querySelectorAll('input[name="mode"]').forEach((radio) => {
        radio.addEventListener("change", (event) => {
          if (state.running) return;
          setMode(event.target.value);
        });
      });
      $("sidebarToggle").addEventListener("click", toggleSidebar);
      bindPreviewToggle();
    }

    function startPolling(token) {
      clearPolling();
      state.pollTimer = window.setInterval(async () => {
        if (token !== state.pollToken || !state.taskId) return;
        await pollTask(token);
      }, 300);
    }

    function clearPolling() {
      if (state.pollTimer) {
        window.clearInterval(state.pollTimer);
        state.pollTimer = null;
      }
    }

    async function pollTask(token) {
      const api = hasApi() ? window.pywebview.api : null;
      if (!api) return;
      try {
        if (typeof api.get_task_logs === "function") {
          const logsRet = await api.get_task_logs(state.taskId, state.logIndex);
          if (logsRet && logsRet.ok) {
            const lines = Array.isArray(logsRet.logs) ? logsRet.logs : [];
            state.logIndex = Number(logsRet.next_index || state.logIndex || 0);
            lines.forEach((line) => {
              const parsed = parseLogLine(line);
              appendLog(parsed.level, parsed.text);
            });
          }
        }
        if (typeof api.get_task_status === "function") {
          const status = await api.get_task_status(state.taskId);
          if (status) {
            updateResult(status);
            if (status.status === "success" || status.status === "fail") {
              if (token !== state.pollToken) return;
              clearPolling();
              state.running = false;
              syncRunningState();
              stopElapsedTicker();
              renderDuration();
              setStatus(status.status, status.status === "success" ? "任务执行完成" : "任务执行失败");
              if (status.status === "fail" && !state.latestError) state.latestError = status.error || "任务执行失败";
            }
          }
        }
      } catch (error) {
        if (token !== state.pollToken) return;
        clearPolling();
        state.running = false;
        syncRunningState();
        stopElapsedTicker();
        renderDuration();
        setStatus("fail", "轮询任务状态失败");
        appendLog("error", `轮询失败: ${error?.message || error}`);
        state.latestError = error?.message || String(error);
      }
    }

    async function runTask() {
      if (state.running) return;
      try {
        persistCurrentForm();
        const payload = validatePayload(state.activeTask);
        if (payload.mode === "in_place") {
          const confirmed = await confirmInPlaceExecution(payload.backup_dir);
          if (!confirmed) { appendLog("warn", "已取消原地修改任务。"); return; }
        }
        const api = hasApi() ? window.pywebview.api : null;
        if (!api || typeof api.run_task !== "function") throw new Error("未检测到 pywebview API，请通过 Python 主程序启动应用。");
        clearResult();
        clearLogs();
        state.running = true;
        state.runStartedAt = Date.now();
        startElapsedTicker();
        state.latestError = "";
        syncRunningState();
        setStatus("running", "任务已提交，正在执行中...");
        appendLog("info", "任务已提交，等待后端开始处理。");
        const response = await api.run_task(payload);
        if (!response || !response.ok || !response.task_id) throw new Error((response && response.error) || "任务启动失败");
        state.taskId = response.task_id;
        state.logIndex = 0;
        state.pollToken += 1;
        startPolling(state.pollToken);
      } catch (error) {
        state.running = false;
        syncRunningState();
        stopElapsedTicker();
        renderDuration();
        setStatus("fail", error?.message || String(error));
        appendLog("error", error?.message || String(error));
        state.latestError = error?.message || String(error);
      }
    }

    function renderAll() {
      ensureTaskState(state.activeTask);
      renderNav();
      renderMode();
      renderTask();
      renderForm();
      syncRunningState();
    }

    function init() {
      Object.keys(TASKS).forEach((taskKey) => ensureTaskState(taskKey));
      bindGlobalEvents();
      renderAll();
      setStatus("idle", "已就绪，选择功能并填写参数后即可执行。");
      clearResult();
      appendLog("info", "界面已加载完成，等待你开始执行任务。");
      if (hasApi()) appendLog("info", "pywebview 通信层已连接。");
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init, { once: true });
    } else {
      init();
    }
  </script>
</body>
</html>
