                startup_task: getValue("p3StartupTask", "bgr2rgb"),
                require_inplace_confirm: getChecked("p3RequireConfirm", true),
                auto_open_output_after_success: getChecked("p3AutoOpenOutput", false)
            },
            preview: {
                auto_refresh: getChecked("p3PreviewAuto", true),
                recursive: getChecked("p3PreviewRecursive", false),
                sample_limit: Number(getValue("p3SampleLimit", 20)),
                debounce_ms: Number(getValue("p3Debounce", 300)),
                expand_details_by_default: getChecked("p3PreviewExpandDetails", false)
            },
            history: {
                remember_paths: getChecked("p3RememberPaths", true),
                max_recent_paths: Number(getValue("p3MaxRecentPaths", 10)),
                recent_paths: (activeSettings().history?.recent_paths || []).slice()
            },
            paths: {
                default_backup_dir: String(getValue("p3DefaultBackupDir", "")).trim(),
                default_output_dir: String(getValue("p3DefaultOutputDir", "")).trim()
            }
        };
    }

    function syncJsonFromVisual() {
        const textarea = document.getElementById("p3SettingsJson");
        if (!textarea) return;
        textarea.value = JSON.stringify(collectVisualSettings(), null, 2);
        state.settingsJsonDirty = false;
    }

    function hookCoreFunctions() {
        const oldLog = window.log;
        window.log = function patchedLog(level, text) {
            const taskKey = state.activeTask;
            const task = ensureEnhanceState(taskKey);
            if (task) {
                const lv = String(level || "info").toLowerCase();
                const line = String(text || "");
                task.rawLogs.push(`[${new Date().toLocaleTimeString("zh-CN", { hour12: false })}] [${lv.toUpperCase()}] ${line}`);
                if (task.rawLogs.length > 5000) task.rawLogs.splice(0, task.rawLogs.length - 5000);
            }
            if (typeof oldLog === "function") oldLog(level, text);
        };

        const oldRestore = window.restoreTaskLogs;
        window.restoreTaskLogs = function patchedRestore(taskKey) {
            if (typeof oldRestore === "function") oldRestore(taskKey);
        };

        const oldRenderAll = window.renderAll;
        window.renderAll = function patchedRenderAll() {
            if (typeof oldRenderAll === "function") oldRenderAll();
        };
    }

    function bindEnhanceEvents() {
        const debugOverlay = document.getElementById("p3DebugOverlay");
        const overlay = document.getElementById("p3SettingsOverlay");
        const errEl = document.getElementById("p3SettingsErr");
        const mustOk = (result, action) => {
            if (!result || result.ok === false) {
                throw new Error((result && result.error) ? result.error : `${action}失败`);
            }
            return result;
        };
        const settingsBtn = document.getElementById("p3SettingsBtn");
        settingsBtn?.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (overlay) overlay.classList.add("hidden");
            window.alert("系统设置还在开发中");
        }, true);

        const toggleDebug = (open) => {
            if (!debugOverlay) return;
            debugOverlay.classList.toggle("hidden", !open);
        };
        const toggleSettings = (open) => {
            if (!overlay) return;
            overlay.classList.toggle("hidden", !open);
        };

        document.getElementById("p3DebugBtn")?.addEventListener("click", () => { toggleDebug(true); renderRaw(state.activeTask); });
        document.getElementById("p3DebugClose")?.addEventListener("click", () => toggleDebug(false));
        debugOverlay?.addEventListener("click", (e) => { if (e.target === debugOverlay) toggleDebug(false); });
        document.getElementById("p3CopyRaw")?.addEventListener("click", async () => {
            const task = ensureEnhanceState(state.activeTask);
            const text = task ? task.rawLogs.join("\n") : "";
            if (!text) return;
            try { await navigator.clipboard.writeText(text); } catch (_) {}
        });
        document.getElementById("p3ClearRaw")?.addEventListener("click", () => {
            const task = ensureEnhanceState(state.activeTask);
            if (!task) return;
            task.rawLogs = [];
            renderRaw(state.activeTask);
        });
        document.getElementById("p3ExportRaw")?.addEventListener("click", () => {
            const task = ensureEnhanceState(state.activeTask);
            const text = task?.rawLogs?.join("\n") || "";
            if (!text) return;
            const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `debug-${Date.now()}.log`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 300);
        });

        document.getElementById("p3SettingsBtn")?.addEventListener("click", async () => {
            errEl.textContent = "";
            const api = window.pywebview?.api;
            try {
                let settings = activeSettings();
                if (api?.get_settings) {
                    const r = await api.get_settings();
                    if (r?.ok && r.settings) settings = r.settings;
                }
                state.appSettings = settings;
                renderSettingsVisual(settings);
                document.getElementById("p3SettingsJson").value = JSON.stringify(settings || {}, null, 2);
                state.settingsJsonDirty = false;
            } catch (e) {
                errEl.textContent = e?.message || String(e);
            }
            toggleSettings(true);
        });
        document.getElementById("p3SettingsClose")?.addEventListener("click", () => toggleSettings(false));
        overlay?.addEventListener("click", (e) => { if (e.target === overlay) toggleSettings(false); });

        document.getElementById("p3SettingsReload")?.addEventListener("click", async () => {
            const api = window.pywebview?.api;
            try {
                const r = mustOk(await api?.get_settings?.(), "读取设置");
                state.appSettings = r.settings || {};
                renderSettingsVisual(state.appSettings);
                document.getElementById("p3SettingsJson").value = JSON.stringify(r?.settings || {}, null, 2);
                state.settingsJsonDirty = false;
                errEl.textContent = "";
            } catch (e) { errEl.textContent = e?.message || String(e); }
        });
        document.getElementById("p3SettingsReset")?.addEventListener("click", async () => {
            const api = window.pywebview?.api;
            try {
                const r = mustOk(await api?.reset_settings?.(), "恢复默认");
                state.appSettings = r.settings || {};
                renderSettingsVisual(state.appSettings);
                document.getElementById("p3SettingsJson").value = JSON.stringify(r?.settings || {}, null, 2);
                state.settingsJsonDirty = false;
                errEl.textContent = "";
            } catch (e) { errEl.textContent = e?.message || String(e); }
        });
        document.getElementById("p3ClearRecentPaths")?.addEventListener("click", () => {
            const settings = activeSettings();
            settings.history = settings.history || {};
            settings.history.recent_paths = [];
            state.appSettings = settings;
            renderSettingsVisual(settings);
            syncJsonFromVisual();
        });
        document.querySelectorAll("#p3SettingsOverlay input, #p3SettingsOverlay select").forEach(el => {
            el.addEventListener("input", () => {
                renderSettingsVisual(collectVisualSettings());
                syncJsonFromVisual();
            });
            el.addEventListener("change", () => {
                renderSettingsVisual(collectVisualSettings());
                syncJsonFromVisual();
            });
        });
        document.getElementById("p3SettingsJson")?.addEventListener("input", () => {
            state.settingsJsonDirty = true;
        });
        document.getElementById("p3SettingsSave")?.addEventListener("click", async () => {
            const api = window.pywebview?.api;
            try {
                const advanced = document.getElementById("p3AdvancedJson");
                let payload;
                if (advanced?.open && state.settingsJsonDirty) {
                    payload = JSON.parse(document.getElementById("p3SettingsJson").value || "{}");
                } else {
                    payload = collectVisualSettings();
                }
                if (api?.validate_settings) {
                    const v = await api.validate_settings({ settings: payload });
                    if (!v?.ok || v?.valid === false) throw new Error(v?.error || (v?.errors || []).join("；") || "设置校验失败");
                }
                if (api?.update_settings) {
                    const r = await api.update_settings({ settings: payload });
                    if (!r?.ok) throw new Error(r?.error || "设置保存失败");
                    state.appSettings = r.settings || payload;
                    renderSettingsVisual(state.appSettings);
                    document.getElementById("p3SettingsJson").value = JSON.stringify(r.settings || payload, null, 2);
                    state.settingsJsonDirty = false;
                }
                errEl.textContent = "";
            } catch (e) { errEl.textContent = e?.message || String(e); }
        });
        document.getElementById("p3SettingsExport")?.addEventListener("click", async () => {
            const api = window.pywebview?.api;
            try {
                const r = mustOk(await api?.export_settings?.(), "导出设置");
                const txt = typeof r?.json === "string" ? r.json : JSON.stringify(r?.settings || {}, null, 2);
                await navigator.clipboard.writeText(txt);
                errEl.textContent = "设置 JSON 已复制到剪贴板。";
            } catch (e) { errEl.textContent = e?.message || String(e); }
        });
        document.getElementById("p3SettingsImport")?.addEventListener("click", async () => {
            const api = window.pywebview?.api;
            try {
                const text = window.prompt("请粘贴设置 JSON：", "");
                if (!text) return;
                const parsed = JSON.parse(text);
                if (api?.import_settings) {
                    const r = mustOk(await api.import_settings({ settings: parsed }), "导入设置");
                    state.appSettings = r.settings || parsed;
                    renderSettingsVisual(state.appSettings);
                    document.getElementById("p3SettingsJson").value = JSON.stringify(r.settings || parsed, null, 2);
                } else {
                    state.appSettings = parsed;
                    renderSettingsVisual(state.appSettings);
                    document.getElementById("p3SettingsJson").value = JSON.stringify(parsed, null, 2);
                }
                state.settingsJsonDirty = false;
                errEl.textContent = "导入成功。";
            } catch (e) { errEl.textContent = e?.message || String(e); }
        });
        document.addEventListener("keydown", e => {
            if (e.key !== "Escape") return;
            toggleDebug(false);
            toggleSettings(false);
        });
    }

    injectStyle();
    injectUi();
    hookCoreFunctions();
    bindEnhanceEvents();
    renderSettingsVisual(activeSettings());
    syncJsonFromVisual();
})();
</script>
</body>
</html>
