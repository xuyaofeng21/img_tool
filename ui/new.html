<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片批处理工具箱</title>
    <style>
        /* ========== 极简专业风变量 ========== */
        :root {
            --bg-body: #f4f7f9;
            --bg-surface: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-active: #e2e8f0;

            --border-color: #e2e8f0;
            --border-focus: #3b82f6;

            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-placeholder: #94a3b8;

            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);

            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
            background-color: var(--bg-body);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========== 布局 ========== */
        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 40;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed {
            margin-left: -260px;
        }

        .brand {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 16px;
            gap: 8px;
            flex-shrink: 0;
        }

        .brand svg { width: 20px; height: 20px; color: var(--primary); }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .nav-label {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin: 0;
        }

        /* 导航与模式项 */
        .nav-item {
            display: flex; align-items: center; padding: 10px 12px; margin-bottom: 4px;
            border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent; color: var(--text-main);
        }

        .nav-item:hover:not(.active) { background: var(--bg-hover); }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
            border-color: rgba(37, 99, 235, 0.2);
            font-weight: 500;
        }

        .nav-item svg { width: 16px; height: 16px; margin-right: 12px; opacity: 0.6; }
        .nav-item.active svg { opacity: 1; }

        .mode-section {
            padding: 16px 12px;
            border-top: 1px solid var(--border-color);
            background: #fafcff;
        }

        .mode-card {
            display: flex; flex-direction: column; padding: 10px 12px;
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            background: var(--bg-surface); cursor: pointer; margin-bottom: 8px; transition: all 0.2s;
        }

        .mode-card:hover { border-color: #cbd5e1; }
        .mode-card.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 2px 4px rgba(37,99,235,0.05); }
        .mode-card input { display: none; }
        .mode-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
        .mode-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

        /* ========== 主工作区 ========== */
        .main {
            flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
        }

        .header {
            height: 60px; background: var(--bg-surface); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02); z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-title { font-size: 16px; font-weight: 600; }
        .header-actions { display: flex; gap: 12px; align-items: center; }

        /* 内容区：页面级全局滚动 */
        .content {
            flex: 1; overflow-y: auto; padding: 24px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 核心并排布局 (预览 + 日志) 强制等高等宽 */
        .grid-2-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: stretch;
        }

        /* ========== 卡片通用组件 ========== */
        .card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
            display: flex; flex-direction: column;
        }

        .card-header {
            padding: 14px 20px; border-bottom: 1px solid var(--border-color); background: #fafafa;
            display: flex; justify-content: space-between; align-items: center; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            flex-shrink: 0;
        }

        .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .card-body { padding: 20px; }

        /* 为预览和日志卡片统一设定固定高度 */
        .preview-card, .log-card {
            height: 360px;
        }

        /* ========== 表单 (任务配置) ========== */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        label { font-size: 13px; font-weight: 500; color: var(--text-main); }
        .hint { font-size: 12px; color: var(--text-muted); }

        .input-wrapper { display: flex; gap: 8px; }
        input[type="text"], input[type="number"] {
            flex: 1; height: 34px; padding: 0 12px; font-size: 13px; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); background: var(--bg-surface); color: var(--text-main); transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        input:disabled { background: var(--bg-hover); color: var(--text-muted); cursor: not-allowed;}

        /* 按钮 */
        .btn {
            height: 34px; padding: 0 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-md);
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
            gap: 6px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-main);
        }
        .btn:hover:not(:disabled) { background: var(--bg-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-icon { padding: 0; width: 34px; border-color: transparent; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }

        .radio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .radio-box {
            border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px 14px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .radio-box:hover { border-color: #cbd5e1; background: var(--bg-hover); }
        .radio-box.active { border-color: var(--primary); background: var(--primary-light); }
        .radio-box input { display: none; }
        .radio-box-content { display: flex; flex-direction: column; gap: 2px;}
        .radio-box-content strong { font-size: 13px; font-weight: 500; color: var(--text-main); }
        .radio-box-content span { font-size: 11px; color: var(--text-muted); }

        /* ========== 预览区 (自适应填充卡片) ========== */
        .preview-card .card-body {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }
        .preview-empty { text-align: center; padding: 40px; color: var(--text-placeholder); font-size: 13px; }
        .preview-list { display: flex; flex-direction: column; gap: 12px; }

        .preview-item {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: #fafafa;
        }

        .preview-item-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 12px; gap: 12px;
        }

        .preview-item-info { flex: 1; min-width: 0; }
        .preview-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .preview-block-title { font-weight: 600; font-size: 13px; }
        .preview-path { font-family: monospace; font-size: 11px; color: var(--text-muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-blue { background: var(--primary-light); color: var(--primary); border: 1px solid rgba(37,99,235,0.2); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }

        /* 下拉详细内容 */
        .preview-samples {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preview-samples.expanded {
            max-height: 300px;
        }

        .samples-wrapper {
            padding: 12px;
            border-top: 1px dashed var(--border-color);
            background: var(--bg-surface);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            overflow-y: auto;
            max-height: 280px;
        }

        .sample-file {
            font-family: monospace; font-size: 11px; color: var(--text-secondary);
            background: var(--bg-body); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border-color);
        }

        /* ========== 终端日志 (自适应填充卡片) ========== */
        .terminal {
            background: #1e293b; color: #f8fafc; padding: 16px;
            flex: 1; overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 12px; line-height: 1.6; border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        .log-line { margin-bottom: 4px; word-break: break-all; }
        .log-info { color: #94a3b8; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; }

        /* ========== 底部沉底：状态大盘 ========== */
        .status-horizontal-body { display: flex; align-items: stretch; padding: 16px 20px; gap: 32px; }
        .metric-group { display: flex; gap: 32px; flex-shrink: 0; align-items: center; }
        .metric { display: flex; flex-direction: column; }
        .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500;}
        .metric-val { font-size: 24px; font-weight: 600; line-height: 1;}
        .val-success { color: var(--success); }
        .val-warn { color: var(--warning); }
        .divider-v { width: 1px; background: var(--border-color); align-self: stretch; }

        .path-group { display: flex; gap: 16px; flex: 1; min-width: 0; }
        .path-link {
            flex: 1; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: #fafafa; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); min-width: 0;
        }
        .path-info { display: flex; flex-direction: column; min-width: 0; margin-right: 12px; }
        .path-text { font-family: monospace; color: var(--text-main); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .card-footer { padding: 10px 20px; background: var(--bg-hover); border-top: 1px solid var(--border-color); font-size: 12px; color: var(--success);}

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; font-weight: 500; background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border-color);
        }
        .status-badge.running { background: #fffbeb; color: #d97706; border-color: #fde68a; }
        .status-badge.success { background: #ecfdf5; color: #059669; border-color: #a7f3d0; }
        .status-badge.error { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); display: flex; align-items: center; justify-content: center; z-index: 50;
        }
        .modal-overlay.hidden { display: none; }
        .modal { background: white; border-radius: var(--radius-lg); width: 400px; box-shadow: var(--shadow-modal); padding: 24px; }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--danger); display: flex; align-items: center; gap: 8px;}
        .modal-body { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5;}
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; }

        /* 全局禁用态 */
        .is-running .nav-item, .is-running .mode-card, .is-running .radio-box { pointer-events: none; opacity: 0.6; }

        /* 响应式 */
        @media (max-width: 1024px) {
            .grid-2-col { grid-template-columns: 1fr; }
            .preview-card, .log-card { height: 320px; }
            .status-horizontal-body { flex-direction: column; align-items: flex-start; gap: 16px;}
            .path-group { flex-direction: column; width: 100%;}
            .divider-v { display: none; }
        }
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; box-shadow: var(--shadow-md); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 30;}
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

<div class="layout" id="app">
    <!-- 侧边栏叠加层 (移动端用) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 左侧菜单 (Sidebar) -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            Image Tools
        </div>

        <div class="sidebar-content">
            <h3 class="nav-label" style="margin-left:0; margin-bottom: 12px;">算法工具箱</h3>
            <div id="navContainer">
                <!-- 动态注入任务导航 -->
            </div>
        </div>

        <div class="mode-section" id="modeGroup">
            <h3 class="nav-label" style="margin-left:0; margin-bottom: 12px;">输出模式</h3>
            <label class="mode-card active">
                <input type="radio" name="mode" value="safe_copy" checked>
                <div class="mode-info">
                    <div class="mode-title">另存输出</div>
                    <div class="mode-desc">处理后保存至新目录，保留原文件</div>
                </div>
            </label>
            <label class="mode-card">
                <input type="radio" name="mode" value="in_place">
                <div class="mode-info">
                    <div class="mode-title">覆盖原文件</div>
                    <div class="mode-desc">直接修改源文件 (需设置备份目录)</div>
                </div>
            </label>
        </div>
    </aside>

    <!-- 主工作区 -->
    <main class="main">
        <header class="header">
            <div class="header-left">
                <button class="btn btn-icon" id="sidebarToggleBtn" onclick="toggleSidebar()" title="切换侧边栏">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="header-title" id="pageTitle">加载中...</div>
            </div>
            <div class="header-actions">
                <div class="status-badge" id="globalStatus">
                    <span class="status-dot"></span>
                    <span id="statusText">就绪</span>
                </div>
            </div>
        </header>

        <!-- 页面级全局滚动容器 -->
        <div class="content">
            <div class="content-container">

                <!-- 1. 任务配置 (满宽) -->
                <div class="card task-config-card">
                    <div class="card-header">
                        <div class="card-title">任务配置</div>
                        <span class="hint" id="taskDesc">...</span>
                    </div>
                    <div class="card-body">
                        <div id="formContainer">
                            <!-- 动态表单将渲染在这里 -->
                        </div>

                        <!-- 按钮与表单融合在底部 -->
                        <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end;">
                            <button class="btn btn-primary" id="runBtn" style="padding: 0 32px; height: 36px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                开始执行
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 2. 横向并排 (预览 + 日志) 保证长宽一致 -->
                <div class="grid-2-col">
                    <!-- 左半：路径预览 -->
                    <div class="card preview-card">
                        <div class="card-header">
                            <div class="card-title">路径解析预览</div>
                            <span class="hint" id="previewSummary">等待路径...</span>
                        </div>
                        <div class="card-body">
                            <div id="previewContainer">
                                <div class="preview-empty">暂无数据</div>
                            </div>
                        </div>
                    </div>

                    <!-- 右半：终端日志 -->
                    <div class="card log-card">
                        <div class="card-header">
                            <div class="card-title">终端日志</div>
                            <button class="btn btn-icon" id="btnClearLog" title="清空日志" style="height: 26px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                        <div class="terminal" id="terminalLog"></div>
                    </div>
                </div>

                <!-- 3. 执行状态沉底大盘 -->
                <div class="card status-card">
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            执行结果与监控
                        </div>
                        <div style="display:flex; gap: 16px;">
                            <span class="hint" id="metricStatus" style="font-weight: 600; text-transform: uppercase;">IDLE</span>
                            <span class="hint" id="timeElapsed" style="font-family: monospace;">耗时 00:00</span>
                        </div>
                    </div>

                    <div class="status-horizontal-body">
                        <div class="metric-group">
                            <div class="metric">
                                <div class="metric-label">成功</div>
                                <div class="metric-val val-success" id="metricSuccess">0</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">失败 / 跳过</div>
                                <div class="metric-val val-warn"><span id="metricFail">0</span> <span style="font-size:16px; font-weight:400; color:var(--text-muted);">/</span> <span id="metricSkip">0</span></div>
                            </div>
                        </div>

                        <div class="divider-v"></div>

                        <div class="path-group">
                            <div class="path-link">
                                <div class="path-info">
                                    <span class="metric-label">输出目录</span>
                                    <span class="path-text" id="outPathLabel" title="未就绪">未就绪</span>
                                </div>
                                <button class="btn" id="btnOpenOut" disabled>打开</button>
                            </div>
                            <div class="path-link">
                                <div class="path-info">
                                    <span class="metric-label">备份目录</span>
                                    <span class="path-text" id="bakPathLabel" title="未就绪">未就绪</span>
                                </div>
                                <button class="btn" id="btnOpenBak" disabled>打开</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer" id="errorHint">系统运行正常，无异常信息</div>
                </div>

            </div>
        </div> <!-- end .content -->
    </main>
</div>

<!-- 确认弹窗 -->
<div class="modal-overlay hidden" id="modalConfirm">
    <div class="modal">
        <div class="modal-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            确认覆盖原文件
        </div>
        <div class="modal-body" id="modalDesc">
            此操作将直接修改源文件夹中的文件。系统会在操作前备份到指定目录，请确认备份路径正确无误。
        </div>
        <div class="modal-footer">
            <button class="btn" id="btnCancel">取消</button>
            <button class="btn btn-danger" id="btnConfirm">确认执行</button>
        </div>
    </div>
</div>

<script>
    // ========== 业务配置定义 ==========
    const TASKS = {
        bgr2rgb: {
            title: "颜色通道转换", desc: "批量转换图片的 RGB/BGR 色彩通道。", icon: '<polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line>',
            supportsInputMode: true,
            paths: [
                { key: "input_dir", label: "输入目录", hint: "待处理的图片目录", placeholder: "选择文件夹...", required: true },
                { key: "output_dir", label: "输出目录", hint: "另存模式下的保存位置", placeholder: "选择文件夹...", required: true, safeOnly: true }
            ],
            params: [
                { key: "color_direction", label: "转换方向", hint: "选择目标通道排列方式", type: "radio", default: "rgb_to_bgr", options: [ { label: "RGB 转 BGR", value: "rgb_to_bgr" }, { label: "BGR 转 RGB", value: "bgr_to_rgb" } ] }
            ]
        },
        rename2: {
            title: "文件批量重命名", desc: "为图片及关联的 JSON 标注文件统一添加前缀。", icon: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
            paths: [
                { key: "source_dir", label: "源目录", hint: "包含图片和 JSON 的文件夹", placeholder: "选择文件夹...", required: true },
                { key: "target_dir", label: "目标目录", hint: "另存模式下的保存位置", placeholder: "选择文件夹...", required: true, safeOnly: true }
            ],
            params: [
                { key: "prefix", label: "文件前缀", hint: "统一添加的文件名前缀", placeholder: "输入前缀文本 (如: raw_)", required: true, type: "text" }
            ]
        },
        select_diverse: {
            title: "相似图片去重", desc: "通过感知哈希算法 (pHash) 筛选出差异较大的图片。", icon: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
            supportsInputMode: true,
            paths: [
                { key: "input_dir", label: "输入目录", hint: "待筛选的图片目录", placeholder: "选择文件夹...", required: true },
                { key: "output_dir", label: "输出目录", hint: "筛选结果存放位置", placeholder: "选择文件夹...", required: true, safeOnly: true }
            ],
            params: [
                { key: "target_count", label: "保留数量", hint: "指定保留的图片张数 (优先)", placeholder: "选填", type: "number", step: "1", min: "1" },
                { key: "select_ratio", label: "保留比例", hint: "按总数的比例保留 (0.01 - 1.0)", placeholder: "0.1", type: "number", step: "0.01", min: "0.01", max: "1", default: 0.1 },
                { key: "hamming_thresh", label: "相似度阈值", hint: "汉明距离 (越小要求越严格)", placeholder: "10", required: true, type: "number", step: "1", min: "0", default: 10 }
            ]
        },
        json_path: {
            title: "JSON 路径修复", desc: "批量修复 LabelMe JSON 文件中的 imagePath 字段指向。", icon: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
            paths: [
                { key: "json_dir", label: "JSON 目录", hint: "待修复的 JSON 文件夹", placeholder: "选择文件夹...", required: true },
                { key: "image_dir", label: "图片参照目录", hint: "用于匹配文件名的图片目录", placeholder: "选择文件夹...", required: true },
                { key: "output_dir", label: "输出目录", hint: "修复后 JSON 的保存位置", placeholder: "选择文件夹...", required: true, safeOnly: true }
            ],
            params: []
        }
    };

    // ========== 状态与 DOM 操作 ==========
    const state = {
        activeTask: "bgr2rgb", mode: "safe_copy", running: false, runStartedAt: 0, elapsedTimer: null,
        taskId: "", pollTimer: null, pollToken: 0, logIndex: 0, latestOutputPath: "", latestBackupPath: "", latestError: "",
        previewTimer: null, previewToken: 0, previewLoading: false, previewData: null, previewError: "",
        formData: {}
    };

    const $ = id => document.getElementById(id);
    const hasApi = () => Boolean(window.pywebview && window.pywebview.api);
    const escapeHtml = val => String(val).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    const escapeAttr = val => escapeHtml(val);
    const cssEscape = str => window.CSS && window.CSS.escape ? CSS.escape(str) : str;

    function truncatePath(path) {
        const value = String(path || "");
        if (value.length <= 56) return value;
        return `${value.slice(0, 24)}...${value.slice(-24)}`;
    }

    function initData() {
        Object.keys(TASKS).forEach(k => {
            state.formData[k] = { paths: {}, params: {}, backup_dir: "", input_mode: "folder", logs: [], result: null, previewData: null };
            TASKS[k].params.forEach(p => { if (p.default !== undefined) state.formData[k].params[p.key] = p.default; });
        });
    }

    // 切换侧边栏 (移动端)
    function toggleSidebar() {
        const sidebar = $("sidebar");
        const overlay = $("sidebarOverlay");
        if(window.innerWidth <= 768) {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    // 详情下拉按钮交互
    function togglePreviewDetails(btn) {
        const samplesDiv = btn.closest('.preview-item').querySelector('.preview-samples');
        samplesDiv.classList.toggle('expanded');
        btn.textContent = samplesDiv.classList.contains('expanded') ? '收起 ▴' : '详细 ▾';
    }

    // ========== 渲染函数 ==========
    function renderNav() {
        const container = $("navContainer"); container.innerHTML = "";
        Object.entries(TASKS).forEach(([k, t]) => {
            const div = document.createElement("div");
            div.className = `nav-item ${state.activeTask === k ? "active" : ""}`;
            div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg><span>${escapeHtml(t.title)}</span>`;
            div.onclick = () => {
                if (!state.running && state.activeTask !== k) {
                    saveForm();
                    // 保存当前任务的日志
                    const currentLogs = [];
                    document.querySelectorAll('#terminalLog .log-line').forEach(el => {
                        currentLogs.push({ lvl: el.className.replace('log-line log-',''), txt: el.textContent });
                    });
                    state.formData[state.activeTask].logs = currentLogs;

                    // 保存预览数据
                    const previewBox = $("previewContainer");
                    const previewSummary = $("previewSummary");
                    state.formData[state.activeTask].previewHtml = previewBox.innerHTML;
                    state.formData[state.activeTask].previewSummaryText = previewSummary.textContent;

                    // 保存结果
                    const metricStatus = $("metricStatus").textContent;
                    const metricSuccess = $("metricSuccess").textContent;
                    const metricFail = $("metricFail").textContent;
                    const metricSkip = $("metricSkip").textContent;
                    const outPath = $("outPathLabel").textContent;
                    const bakPath = $("bakPathLabel").textContent;
                    const errorHint = $("errorHint").textContent;
                    state.formData[state.activeTask].result = {
                        status: metricStatus,
                        success_count: metricSuccess,
                        fail_count: metricFail,
                        skipped_count: metricSkip,
                        output_path: outPath !== "未就绪" ? outPath : "",
                        backup_path: bakPath !== "未就绪" ? bakPath : "",
                        error: errorHint
                    };

                    state.activeTask = k;
                    renderAll();
                    // 恢复之前保存的数据
                    restoreTaskLogs(k);
                    restoreTaskResult(k);
                    restoreTaskPreview(k);
                }
            };
            container.appendChild(div);
        });
    }

    function restoreTaskLogs(taskKey) {
        const logs = state.formData[taskKey].logs || [];
        const b = $("terminalLog");
        b.innerHTML = "";
        logs.forEach(l => {
            const d = document.createElement("div");
            d.className = `log-line log-${l.lvl}`; d.textContent = l.txt;
            b.appendChild(d);
        });
        b.scrollTop = b.scrollHeight;
    }

    function restoreTaskResult(taskKey) {
        const r = state.formData[taskKey].result;
        if (!r) return;
        $("metricStatus").textContent = r.status || "IDLE";
        $("metricSuccess").textContent = r.success_count || "0";
        $("metricFail").textContent = r.fail_count || "0";
        $("metricSkip").textContent = r.skipped_count || "0";
        $("outPathLabel").textContent = r.output_path || "未就绪";
        $("outPathLabel").title = r.output_path || "未就绪";
        $("bakPathLabel").textContent = r.backup_path || "未就绪";
        $("bakPathLabel").title = r.backup_path || "未就绪";
        $("btnOpenOut").disabled = !r.output_path;
        $("btnOpenBak").disabled = !r.backup_path;
        if (r.error && r.error !== "运行正常") {
            $("errorHint").style.color = "var(--danger)";
            $("errorHint").textContent = r.error;
        } else {
            $("errorHint").style.color = "var(--success)";
            $("errorHint").textContent = r.error || "运行正常";
        }
    }

    function restoreTaskPreview(taskKey) {
        const task = state.formData[taskKey];
        if (task.previewHtml) {
            $("previewContainer").innerHTML = task.previewHtml;
            $("previewSummary").textContent = task.previewSummaryText || "等待路径...";
        }
    }

    function renderMode() {
        document.querySelectorAll(".mode-card").forEach(el => {
            const input = el.querySelector('input');
            el.classList.toggle("active", input && input.value === state.mode);
        });
    }

    function renderForm() {
        const t = TASKS[state.activeTask], ts = state.formData[state.activeTask], html = [];

        $("pageTitle").textContent = t.title;
        $("taskDesc").textContent = t.desc;

        if (t.supportsInputMode) {
            const inputMode = ts.input_mode || 'folder';
            const isMulti = inputMode === 'files';
            html.push(`
                <div class="form-group">
                    <div class="label-row"><label>处理对象</label></div>
                    <div class="radio-grid">
                        <label class="radio-box ${inputMode === 'folder' ? 'active' : ''}">
                            <input type="radio" name="input_mode" value="folder" ${inputMode === 'folder' ? 'checked' : ''} ${state.running ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>整个文件夹</strong><span>批量处理目录下所有文件</span></div>
                        </label>
                        <label class="radio-box ${inputMode === 'files' ? 'active' : ''}">
                            <input type="radio" name="input_mode" value="files" ${inputMode === 'files' ? 'checked' : ''} ${state.running ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>文件列表</strong><span>选择多个文件处理</span></div>
                        </label>
                    </div>
                </div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
            `);
        }

        t.paths.forEach(p => {
            if (p.safeOnly && state.mode === "in_place") return;
            const inputMode = ts.input_mode || 'folder';
            const isFilesMode = t.supportsInputMode && inputMode === 'files' && p.key === 'input_dir';
            const actionText = isFilesMode ? "选择文件" : "选择目录";
            const val = ts.paths[p.key] || "";

            html.push(`
                <div class="form-group">
                    <div class="label-row">
                        <label>${escapeHtml(p.label)}</label>
                        <span class="hint">${escapeHtml(p.hint)}</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" data-kind="path" data-key="${escapeAttr(p.key)}" placeholder="${escapeAttr(p.placeholder)}" value="${escapeAttr(val)}" ${state.running ? 'disabled' : ''}>
                        <button class="btn" data-browse="${escapeAttr(p.key)}" data-type="${isFilesMode ? 'files' : 'folder'}" ${state.running ? 'disabled' : ''}>${actionText}</button>
                    </div>
                </div>
            `);
        });

        if (state.mode === "in_place") {
            html.push(`
                <div class="form-group" style="padding: 16px; background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-md); margin-top: 20px;">
                    <div class="label-row">
                        <label style="color: var(--danger);">覆盖前备份目录 <span style="color:red">*</span></label>
                        <span class="hint" style="color: var(--danger);">必须指定，防止源文件损坏</span>
                    </div>
                    <div class="input-wrapper" style="margin-top: 8px;">
                        <input type="text" data-kind="backup" placeholder="选择备份存放位置..." value="${escapeAttr(ts.backup_dir || '')}" ${state.running ? 'disabled' : ''}>
                        <button class="btn btn-danger" data-browse="backup_dir" data-type="folder" ${state.running ? 'disabled' : ''} style="background:var(--danger); border-color:var(--danger); color:white;">选择目录</button>
                    </div>
                </div>
            `);
        }

        if (t.params.length > 0) {
            html.push(`<hr style="border:0; border-top:1px dashed var(--border-color); margin: 24px 0;">`);
            t.params.forEach(p => {
                const val = ts.params[p.key] ?? p.default ?? "";
                if (p.type === "radio") {
                    const opts = p.options.map(opt => `
                        <label class="radio-box ${val === opt.value ? 'active' : ''}" style="padding: 8px 14px;">
                            <input type="radio" name="${escapeAttr(p.key)}" value="${escapeAttr(opt.value)}" ${val === opt.value ? 'checked' : ''} ${state.running ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>${escapeHtml(opt.label)}</strong></div>
                        </label>
                    `).join("");
                    html.push(`<div class="form-group"><div class="label-row"><label>${escapeHtml(p.label)}</label><span class="hint">${escapeHtml(p.hint)}</span></div><div class="radio-grid">${opts}</div></div>`);
                } else {
                    html.push(`
                        <div class="form-group">
                            <div class="label-row"><label>${escapeHtml(p.label)}</label><span class="hint">${escapeHtml(p.hint)}</span></div>
                            <input type="${p.type}" data-kind="param" data-key="${escapeAttr(p.key)}" placeholder="${escapeAttr(p.placeholder || '')}" value="${escapeAttr(String(val))}" ${p.step ? `step="${escapeAttr(p.step)}"` : ''} ${p.min !== undefined ? `min="${p.min}"` : ''} ${p.max !== undefined ? `max="${p.max}"` : ''} ${state.running ? 'disabled' : ''}>
                        </div>
                    `);
                }
            });
        }

        $("formContainer").innerHTML = html.join("");
        bindFormEvents();
        triggerPreview();
    }

    // ========== 事件绑定 ==========
    function bindFormEvents() {
        document.querySelectorAll('input[data-kind]').forEach(el => {
            el.addEventListener('input', e => {
                const k = e.target.dataset.key, kind = e.target.dataset.kind, s = state.formData[state.activeTask];
                if (kind === 'path') s.paths[k] = e.target.value;
                else if (kind === 'param') s.params[k] = e.target.value;
                else s.backup_dir = e.target.value;
                triggerPreview();
            });
        });

        document.querySelectorAll('input[name="input_mode"]').forEach(el => {
            el.addEventListener('change', e => {
                if (!state.running) { state.formData[state.activeTask].input_mode = e.target.value; renderForm(); triggerPreview(); }
            });
        });

        const t = TASKS[state.activeTask];
        t.params.filter(p => p.type === 'radio').forEach(p => {
            document.querySelectorAll(`input[name="${cssEscape(p.key)}"]`).forEach(el => {
                el.addEventListener('change', e => {
                    if (!state.running) { state.formData[state.activeTask].params[p.key] = e.target.value; renderForm(); triggerPreview(); }
                });
            });
        });

        document.querySelectorAll('button[data-browse]').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.preventDefault(); if (state.running) return;
                const k = btn.dataset.browse, type = btn.dataset.type, api = window.pywebview?.api;
                let path;
                if (type === 'files') {
                    path = api ? await api.select_files() : "";
                } else if (type === 'file') {
                    path = api ? await api.select_file() : "";
                } else {
                    path = api ? await api.select_folder() : "";
                }
                if (!path) return;

                if (k === 'backup_dir') { state.formData[state.activeTask].backup_dir = path; document.querySelector('input[data-kind="backup"]').value = path; }
                else { state.formData[state.activeTask].paths[k] = path; document.querySelector(`input[data-kind="path"][data-key="${cssEscape(k)}"]`).value = path; }
                triggerPreview();
            });
        });
    }

    function saveForm() {
        const s = state.formData[state.activeTask];
        document.querySelectorAll('input[data-kind="path"]').forEach(i => s.paths[i.dataset.key] = i.value);
        document.querySelectorAll('input[data-kind="param"]').forEach(i => s.params[i.dataset.key] = i.value);
        const b = document.querySelector('input[data-kind="backup"]'); if(b) s.backup_dir = b.value;
    }

    // ========== 状态控制 ==========
    function syncStatus(st, msg) {
        const badge = $("globalStatus"), txt = $("statusText");
        badge.className = "status-badge";
        if (st === 'running') { badge.classList.add('running'); txt.textContent = msg || "处理中..."; }
        else if (st === 'success') { badge.classList.add('success'); txt.textContent = msg || "完成"; }
        else if (st === 'fail') { badge.classList.add('error'); txt.textContent = msg || "错误"; }
        else { txt.textContent = "就绪"; }

        const r = state.running;
        document.body.classList.toggle('is-running', r);
        $("runBtn").disabled = r;
        $("btnClearLog").disabled = r;

        const taskState = state.formData[state.activeTask];
        $("btnOpenOut").disabled = r || !taskState.latestOutputPath;
        $("btnOpenBak").disabled = r || !taskState.latestBackupPath;
        document.querySelectorAll('#modeGroup input').forEach(i => i.disabled = r);

        $("runBtn").innerHTML = r
            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10"/><path d="M12 2v4"/></svg> 执行中...'
            : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> 开始执行';
    }

    const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    function updateTimer() { $("timeElapsed").textContent = `耗时 ${state.runStartedAt ? fmtTime(Math.floor((Date.now()-state.runStartedAt)/1000)) : "00:00"}`; }
    function toggleTimer(on) { if(state.elapsedTimer) clearInterval(state.elapsedTimer); if(on) state.elapsedTimer = setInterval(updateTimer, 1000); updateTimer(); }

    function log(lvl, txt) {
        const b = $("terminalLog"), d = document.createElement("div");
        d.className = `log-line log-${lvl}`; d.textContent = txt;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
        // 保存到当前任务的日志
        if (!state.running) return;
        const s = state.formData[state.activeTask];
        if (!s.logs) s.logs = [];
        s.logs.push({ lvl, txt });
    }

    function updateMetrics(s) {
        $("metricSuccess").textContent = s.success_count || "0";
        $("metricFail").textContent = s.fail_count || "0";
        $("metricSkip").textContent = s.skipped_count || "0";

        const outputPath = s.output_path || "";
        const backupPath = s.backup_path || "";

        $("outPathLabel").textContent = outputPath || "未就绪";
        $("outPathLabel").title = outputPath || "未就绪";
        $("bakPathLabel").textContent = backupPath || "未就绪";
        $("bakPathLabel").title = backupPath || "未就绪";

        $("btnOpenOut").disabled = !outputPath;
        $("btnOpenBak").disabled = !backupPath;

        const err = $("errorHint");
        if(s.error) { err.style.color = "var(--danger)"; err.textContent = s.error; }
        else { err.style.color = "var(--success)"; err.textContent = "运行正常"; }

        // 保存到当前任务的结果
        const taskState = state.formData[state.activeTask];
        taskState.result = { success_count: s.success_count, fail_count: s.fail_count, skipped_count: s.skipped_count, output_path: outputPath, backup_path: backupPath, error: s.error };
        taskState.latestOutputPath = outputPath;
        taskState.latestBackupPath = backupPath;
    }

    // ========== 核心业务逻辑 ==========
    function buildPayload(forPrev=false) {
        ensureTaskState(state.activeTask);
        const t = TASKS[state.activeTask], s = state.formData[state.activeTask], p = {task:state.activeTask, mode:state.mode, paths:{}, params:{}, backup_dir:s.backup_dir};
        t.paths.forEach(f => { if(!(forPrev && f.safeOnly)){ const v=String(s.paths[f.key]||"").trim(); if(v) p.paths[f.key]=v; } });
        t.params.forEach(f => { const v=String(s.params[f.key]||"").trim(); if(v) p.params[f.key]=f.type==='number'?Number(v):v; });
        if(t.supportsInputMode) {
            const inputMode = s.input_mode || 'folder';
            p.paths.input_mode = inputMode;
            if(inputMode === 'files') p.paths.input_path = p.paths.input_dir;
        }
        return p;
    }

    function ensureTaskState(taskKey) {
        if (!state.formData[taskKey]) state.formData[taskKey] = { paths: {}, params: {}, backup_dir: "", input_mode: "folder", logs: [], result: null, previewData: null };
    }

    // 预览逻辑 (抽屉详情模式)
    function triggerPreview() {
        if (state.previewTimer) clearTimeout(state.previewTimer);
        state.previewTimer = setTimeout(async () => {
            const p = buildPayload(true), box = $("previewContainer"), sum = $("previewSummary");
            const taskState = state.formData[state.activeTask];

            // 如果没有路径，清空预览
            if (!Object.keys(p.paths).length || !p.paths.input_dir) {
                sum.textContent = "请先选择有效路径";
                box.innerHTML = '<div class="preview-empty">暂无数据</div>';
                taskState.previewData = null;
                return;
            }

            sum.textContent = "分析中..."; box.innerHTML = '<div class="preview-empty">正在读取目录结构...</div>';
            const api = window.pywebview?.api;
            if (!api?.preview_path) {
                // 没有API时显示提示
                sum.textContent = "预览功能需要后端支持";
                return;
            }

            try {
                const r = await api.preview_path(p);
                // 保存预览数据
                taskState.previewData = r;

                // 解析sections
                const secs = r.sections || (r.data ? [r.data] : [r]);
                if (!secs.length || !secs[0]) {
                    sum.textContent = "未找到受支持的文件";
                    box.innerHTML = '<div class="preview-empty">当前目录下没有支持处理的文件</div>';
                    return;
                }

                sum.textContent = `发现 ${secs.length} 个数据组`;
                box.innerHTML = `<div class="preview-list">` + secs.map(sec => {
                    // 默认仅显示数量统计
                    const counts = sec.counts || sec.counts_by_ext || [];
                    const cnts = counts.map(i => `<span class="tag tag-blue">${escapeHtml(i.label||i[0]||'文件')}×${i.count||i[1]||0}</span>`).join("");
                    // 详细样本文件
                    const samples = sec.samples || sec.sample_files || [];
                    const smps = samples.map(sa => `<span class="sample-file" title="${escapeAttr(sa)}">${escapeHtml(sa)}</span>`).join("");

                    return `
                        <div class="preview-item">
                            <div class="preview-item-top">
                                <div class="preview-item-info">
                                    <div class="preview-title-row">
                                        <div class="preview-block-title">${escapeHtml(sec.title||sec.name||'目录')}</div>
                                        <div class="preview-path" title="${escapeAttr(sec.path||'')}">${escapeHtml(truncatePath(sec.path||''))}</div>
                                    </div>
                                    <div class="tag-row">${cnts || '<span class="hint">无相关文件统计</span>'}</div>
                                </div>
                                <button class="btn btn-icon" style="width: auto; height: 24px; padding: 0 8px; font-size: 11px;" onclick="togglePreviewDetails(this)">详细 ▾</button>
                            </div>
                            <div class="preview-samples">
                                <div class="samples-wrapper">
                                    ${smps || '<span class="hint" style="padding: 4px;">没有可展示的样本</span>'}
                                </div>
                            </div>
                        </div>`;
                }).join("") + `</div>`;
            } catch (e) {
                sum.textContent = "路径解析失败"; box.innerHTML = `<div class="preview-empty" style="color:var(--danger)">${escapeHtml(e.message)}</div>`;
            }
        }, 300);
    }

    // 执行逻辑
    async function runTask() {
        if(state.running) return;
        try {
            saveForm(); const t = TASKS[state.activeTask], p = buildPayload();

            t.paths.forEach(f => { if(f.safeOnly && state.mode==="in_place") return; if(f.required && !p.paths[f.key]) throw new Error(`请指定${f.label}`); });
            t.params.forEach(f => { if(f.required && p.params[f.key]===undefined) throw new Error(`请填写参数: ${f.label}`); });
            if(state.mode==="in_place") {
                if(!p.backup_dir) throw new Error("覆盖模式必须指定备份目录，以防数据丢失");

                // 弹窗确认
                const modal = $("modalConfirm");
                $("modalDesc").textContent = `此操作将直接修改源文件夹中的文件。系统会在操作前备份到：${p.backup_dir}，请确认备份路径正确无误。`;
                modal.classList.remove('hidden');

                const confirmed = await new Promise(res => {
                    const close = (val) => { modal.classList.add('hidden'); $("btnConfirm").onclick=null; $("btnCancel").onclick=null; res(val); };
                    $("btnConfirm").onclick = () => close(true); $("btnCancel").onclick = () => close(false);
                });
                if(!confirmed) { log("warn", "已取消操作。"); return; }
            }

            const api = window.pywebview?.api; if(!api?.run_task) throw new Error("未检测到后端环境");

            // 清空当前任务的日志和结果
            const taskState = state.formData[state.activeTask];
            taskState.logs = [];
            taskState.result = null;
            taskState.latestOutputPath = "";
            taskState.latestBackupPath = "";
            $("terminalLog").innerHTML = "";
            updateMetrics({success_count:0, fail_count:0, skipped_count:0});

            state.running = true; state.runStartedAt = Date.now(); toggleTimer(true); syncStatus("running");
            log("info", `[INFO] 开始执行任务: ${t.title}`);

            const res = await api.run_task(p);
            if(!res?.ok) throw new Error(res?.error || "任务启动失败");

            state.taskId = res.task_id; state.logIndex = 0; state.pollToken++;

            const tk = state.pollToken;
            if(state.pollTimer) clearInterval(state.pollTimer);
            state.pollTimer = setInterval(async () => {
                if(tk !== state.pollToken || !state.taskId) return;
                if(api.get_task_logs) {
                    const r = await api.get_task_logs(state.taskId, state.logIndex);
                    if(r?.ok) {
                        state.logIndex = Number(r.next_index || state.logIndex);
                        (r.logs||[]).forEach(l => { const m = String(l||"").match(/^\[[^\]]+\]\s+\[([A-Z]+)\]\s+(.*)$/); m ? log(m[1].toLowerCase()==='error'||m[1].toLowerCase()==='warn'?m[1].toLowerCase():'info', m[2]) : log('info', l); });
                    }
                }
                if(api.get_task_status) {
                    const s = await api.get_task_status(state.taskId);
                    if(s) {
                        updateMetrics(s);
                        if(s.status === "success" || s.status === "fail") {
                            clearInterval(state.pollTimer); state.running = false; toggleTimer(false);
                            syncStatus(s.status, s.status === "success" ? "执行成功" : "执行失败");
                        }
                    }
                }
            }, 300);

        } catch(e) {
            state.running = false; toggleTimer(false); syncStatus("fail", e.message); log("error", e.message);
        }
    }

    function renderAll() { renderNav(); renderMode(); renderForm(); syncStatus('idle'); restoreTaskLogs(state.activeTask); restoreTaskResult(state.activeTask); }

    // 初始化
    document.addEventListener("DOMContentLoaded", () => {
        initData();

        $("runBtn").addEventListener("click", runTask);
        $("btnClearLog").addEventListener("click", () => {
            const b = $("terminalLog");
            b.innerHTML = "";
            state.formData[state.activeTask].logs = [];
        });
        $("btnOpenOut").addEventListener("click", () => {
            const path = state.formData[state.activeTask].latestOutputPath;
            if (path) window.pywebview?.api?.open_path(path);
        });
        $("btnOpenBak").addEventListener("click", () => {
            const path = state.formData[state.activeTask].latestBackupPath;
            if (path) window.pywebview?.api?.open_path(path);
        });

        // 移动端菜单逻辑
        if(window.innerWidth <= 768) $("mobileMenuBtn").style.display = "block";

        document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", e => {
            if(!state.running) { state.mode = e.target.value; renderMode(); renderForm(); }
        }));

        const style = document.createElement('style');
        style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);

        renderAll();
        if(hasApi()) log("info", "后端引擎连接成功，准备就绪。");
        else log("warn", "提示：当前在浏览器环境预览，未连接本地 Python 服务。");
    });
</script>
</body>
</html>
