    function renderMode() {
        const isSafeCopyDisabled = state.activeTask === "reorder_labels" || state.activeTask === "json_path";
        const isInPlaceDisabled = state.activeTask === "synthesize";
        document.querySelectorAll(".mode-card").forEach(el => {
            const input = el.querySelector('input');
            if (input) {
                // 同步checked状态
                input.checked = input.value === state.mode;
                // 标签排序时禁用另存输出
                if (input.value === "safe_copy") {
                    input.disabled = isSafeCopyDisabled;
                    el.style.opacity = isSafeCopyDisabled ? "0.5" : "1";
                    el.style.pointerEvents = isSafeCopyDisabled ? "none" : "";
                }
                // 合成标注时禁用覆盖原文件
                if (input.value === "in_place") {
                    input.disabled = isInPlaceDisabled;
                    el.style.opacity = isInPlaceDisabled ? "0.5" : "1";
                    el.style.pointerEvents = isInPlaceDisabled ? "none" : "";
                }
            }
            el.classList.toggle("active", input && input.value === state.mode);
        });
    }

    function renderForm() {
        const t = TASKS[state.activeTask], ts = state.formData[state.activeTask], html = [];
        applyDefaultOutputPath(state.activeTask);
        const settings = getAppSettings();
        if (!ts.backup_dir && settings.paths?.default_backup_dir) {
            ts.backup_dir = settings.paths.default_backup_dir;
        }

        $("pageTitle").textContent = t.title;
        $("taskDesc").textContent = t.desc;

        if (t.supportsInputMode) {
            const inputMode = ts.input_mode || 'folder';
            html.push(`
                <div class="form-group">
                    <div class="label-row"><label>处理对象</label></div>
                    <div class="radio-grid">
                        <label class="radio-box ${inputMode === 'folder' ? 'active' : ''}">
                            <input type="radio" name="input_mode" value="folder" ${inputMode === 'folder' ? 'checked' : ''} ${state.running ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>整个文件夹</strong><span>批量处理目录下所有文件</span></div>
                        </label>
                        <label class="radio-box ${inputMode === 'file' ? 'active' : ''}">
                            <input type="radio" name="input_mode" value="file" ${inputMode === 'file' ? 'checked' : ''} ${state.running ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>单个文件</strong><span>按文件模式处理单个文件</span></div>
                        </label>
                    </div>
                </div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
            `);
        }

        // 合成标注强制 safe_copy 模式（必须在路径渲染前处理，否则 safeOnly 字段会被跳过）
        if (state.activeTask === "synthesize" && state.mode === "in_place") {
            state.mode = "safe_copy";
        }

        t.paths.forEach(p => {
            if (p.safeOnly && state.mode === "in_place" && !(state.activeTask === "select_diverse" && p.key === "output_dir")) return;
            const inputMode = ts.input_mode || 'folder';
            const isFilesMode = t.supportsInputMode && inputMode === 'file' && p.key === 'input_dir';
            const actionText = isFilesMode ? "选择文件" : "选择目录";
            const val = ts.paths[p.key] || "";

            html.push(`
                <div class="form-group">
                    <div class="label-row">
                        <label>${escapeHtml(p.label)}</label>
                        <span class="hint">${escapeHtml(p.hint)}</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" data-kind="path" data-key="${escapeAttr(p.key)}" placeholder="${escapeAttr(p.placeholder)}" value="${escapeAttr(val)}" ${state.running ? 'disabled' : ''}>
                        <button class="btn" data-browse="${escapeAttr(p.key)}" data-type="${isFilesMode ? 'file' : 'folder'}" ${state.running ? 'disabled' : ''}>${actionText}</button>
                    </div>
                </div>
            `);
        });

        if (state.mode === "in_place") {
            html.push(`
                <div class="form-group" style="padding: 16px; background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-md); margin-top: 20px;">
                    <div class="label-row">
                        <label style="color: var(--danger);">⚠️ 覆盖原文件模式</label>
                    </div>
                    <div style="margin-top: 8px; color: var(--danger); font-size: 13px;">
                        此操作将直接修改源文件夹中的文件，请提前备份！
                    </div>
                </div>
            `);
        }

        // 隐藏清除缓存按钮（非合成标注时）
        const clearBtn = $("btnClearSynthesizeCache");
        if (clearBtn) clearBtn.style.display = "none";
        if (t.params.length > 0) {
            html.push(`<hr style="border:0; border-top:1px dashed var(--border-color); margin: 24px 0;">`);
            // 手动合成模式下隐藏部分参数
            const synthMode = ts.params?.synthesize_mode || "system";
            const hiddenInManual = ["max_objects", "max_object_size", "rotation_angle", "grass_label"];
            // 分行渲染参数，每行最多2个
            const paramRows = [];
            let currentRow = [];
            t.params.forEach(p => {
                // 手动合成模式隐藏部分参数
                if (synthMode === "manual" && hiddenInManual.includes(p.key)) return;
                if (p.type === "radio") {
                    // radio类型单独一行
                    if (currentRow.length > 0) {
                        paramRows.push(currentRow);
                        currentRow = [];
                    }
                    paramRows.push([p]);
                } else {
                    if (currentRow.length >= 2) {
                        paramRows.push(currentRow);
                        currentRow = [];
                    }
                    currentRow.push(p);
                }
            });
            if (currentRow.length > 0) paramRows.push(currentRow);

            paramRows.forEach(row => {
                if (row.length === 1 && row[0].type === "radio") {
                    // radio类型单独一行
                    const p = row[0];
                    const val = ts.params[p.key] ?? p.default ?? "";
                    const opts = p.options.map(opt => `
                        <label class="radio-box ${val === opt.value ? 'active' : ''}" style="padding: 8px 14px; ${opt.disabled ? 'opacity: 0.4; pointer-events: none; cursor: not-allowed;' : ''}">
                            <input type="radio" name="${escapeAttr(p.key)}" value="${escapeAttr(opt.value)}" ${val === opt.value ? 'checked' : ''} ${state.running || opt.disabled ? 'disabled' : ''}>
                            <div class="radio-box-content"><strong>${escapeHtml(opt.label)}</strong>${opt.disabled ? '<span style="font-size:11px;color:var(--text-muted);display:block;">(暂未开放)</span>' : ''}</div>
                        </label>
                    `).join("");
                    html.push(`<div class="form-group"><div class="label-row"><label>${escapeHtml(p.label)}</label><span class="hint">${escapeHtml(p.hint)}</span></div><div class="radio-grid">${opts}</div></div>`);
                } else {
                    // 每行2个参数
                    html.push(`<div class="form-row">`);
                    row.forEach(p => {
                        const val = ts.params[p.key] ?? p.default ?? "";
                        const disableParam = state.running || (
                            state.activeTask === "synthesize" &&
                            p.key === "target_label" &&
                            (
                                ts.sourceAnalysis?.mode === "all_without_json" ||
                                ts.sourceAnalysis?.mode === "all_with_json"
                            )
                        );
                        if (p.type === "text" && p.datalist) {
                            // 输入框带 datalist 下拉建议（可选择可输入）
                            html.push(`
                                <div class="form-group" style="flex:1; min-width:0;">
                                    <div class="label-row"><label>${escapeHtml(p.label)}</label><span class="hint">${escapeHtml(p.hint)}</span></div>
                                    <input type="text" data-kind="param" data-key="${escapeAttr(p.key)}" placeholder="${escapeAttr(p.placeholder || '')}" value="${escapeAttr(String(val))}" list="${p.datalist}" class="input-with-datalist" ${disableParam ? 'disabled' : ''}>
                                </div>
                            `);
                        } else if (p.type === "text" || p.type === "number") {
                            html.push(`
                                <div class="form-group" style="flex:1; min-width:0;">
                                    <div class="label-row"><label>${escapeHtml(p.label)}</label><span class="hint">${escapeHtml(p.hint)}</span></div>
                                    <input type="${p.type}" data-kind="param" data-key="${escapeAttr(p.key)}" placeholder="${escapeAttr(p.placeholder || '')}" value="${escapeAttr(String(val))}" ${p.step ? `step="${escapeAttr(p.step)}"` : ''} ${p.min !== undefined ? `min="${p.min}"` : ''} ${p.max !== undefined ? `max="${p.max}"` : ''} ${disableParam ? 'disabled' : ''}>
                                </div>
                            `);
                        }
                    });
                    html.push(`</div>`);
                }
            });
        }

        $("formContainer").innerHTML = html.join("");
        // 下拉建议 datalist
        if (!$("labelDatalist")) {
            const dl = document.createElement("datalist");
            dl.id = "labelDatalist";
            dl.innerHTML = `<option value="obstacle"><option value="animal">`;
            document.body.appendChild(dl);
        }
        bindFormEvents();
        triggerPreview();
        if (state.activeTask === "reorder_labels" || state.activeTask === "json_path") {
            // 标签排序/JSON路径修复不支持另存输出，强制切为原地修改
            if (state.mode === "safe_copy") {
                state.mode = "in_place";
                const safeCopyRadio = document.querySelector('input[name="mode"][value="safe_copy"]');
                const inPlaceRadio = document.querySelector('input[name="mode"][value="in_place"]');
                if (safeCopyRadio) safeCopyRadio.checked = false;
                if (inPlaceRadio) inPlaceRadio.checked = true;
                renderMode();
            }
            // 隐藏手动合成 UI
            hideManualSynthesizeUI();
        } else if (state.activeTask === "synthesize") {
            // 合成标注不支持原地修改，确保 safe_copy 模式 + 同步 UI
            if (state.mode === "in_place") {
                state.mode = "safe_copy";
            }
            renderMode();
            // 显示清除缓存按钮
            const clearBtn = $("btnClearSynthesizeCache");
            if (clearBtn) clearBtn.style.display = "";
            updateSynthesizeSourceStatusUI();
            applySynthesizeParamStateUI();
            requestAnimationFrame(() => requestAnimationFrame(() => {
                inspectSynthesizeSource(false);
            }));
            // 初始化手动合成UI
            setupManualSynthesizeUI();
        } else {
            hideManualSynthesizeUI();
            const clearBtn = $("btnClearSynthesizeCache");
            if (clearBtn) clearBtn.style.display = "none";
        }
    }

    // ========== 事件绑定 ==========
    function bindFormEvents() {
        document.querySelectorAll('input[data-kind]').forEach(el => {
            el.addEventListener('input', e => {
                const k = e.target.dataset.key, kind = e.target.dataset.kind, s = state.formData[state.activeTask];
                if (kind === 'path') s.paths[k] = e.target.value;
                else if (kind === 'param') s.params[k] = e.target.value;
                else s.backup_dir = e.target.value;
                if (state.activeTask === "synthesize" && kind === "path" && (k === "source_folder" || k === "bg_json_folder")) {
                    inspectSynthesizeSource(true);
                    // 手动模式下也触发列表加载
                    if (state.synthesizeManual.mode === "manual") {
                        if (k === "bg_json_folder") loadBackgroundList();
                        else if (k === "source_folder") loadMaterialLibrary();
                    }
                }
                triggerPreview();
            });
        });

        document.querySelectorAll('input[name="input_mode"]').forEach(el => {
            el.addEventListener('change', e => {
                if (!state.running) { state.formData[state.activeTask].input_mode = e.target.value; renderForm(); triggerPreview(); }
            });
        });

        const t = TASKS[state.activeTask];
        t.params.filter(p => p.type === 'radio').forEach(p => {
            document.querySelectorAll(`input[name="${cssEscape(p.key)}"]`).forEach(el => {
                el.addEventListener('change', e => {
                    if (!state.running) {
                        state.formData[state.activeTask].params[p.key] = e.target.value;
                        // 合成模式切换时更新 state 并显示/隐藏手动合成 UI
                        if (state.activeTask === "synthesize" && p.key === "synthesize_mode") {
                            handleSynthesizeModeChange(e.target.value);
                        }
                        renderForm();
                        triggerPreview();
                    }
                });
            });
        });

        document.querySelectorAll('button[data-browse]').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.preventDefault(); if (state.running) return;
                const k = btn.dataset.browse, type = btn.dataset.type, api = window.pywebview?.api;
                let path;
                if (type === 'file' || type === 'files') {
                    path = api ? await api.select_file() : "";
                } else {
                    path = api ? await api.select_folder() : "";
                }
                if (!path) return;

                if (k === 'backup_dir') { state.formData[state.activeTask].backup_dir = path; document.querySelector('input[data-kind="backup"]').value = path; }
                else { state.formData[state.activeTask].paths[k] = path; document.querySelector(`input[data-kind="path"][data-key="${cssEscape(k)}"]`).value = path; }
                await rememberRecentPath(path);
                if (state.activeTask === "synthesize" && k === "source_folder") {
                    inspectSynthesizeSource(true);
                }
                // 手动合成模式下，路径变化时重新加载列表
                if (state.activeTask === "synthesize" && state.synthesizeManual.mode === "manual") {
                    if (k === "bg_json_folder") loadBackgroundList();
                    else if (k === "source_folder") loadMaterialLibrary();
                }
                triggerPreview();
            });
        });

        $("btnClearSynthesizeCache")?.addEventListener("click", async () => {
            if (!confirm("是否确认清除缓存？")) return;
            try {
                const api = window.pywebview?.api;
                const res = await api?.clear_cache();
                if (res?.ok) {
                    alert(`已清除 ${res.removed_count} 个缓存文件`);
                } else {
                    alert("清除失败: " + (res?.error || "未知错误"));
                }
            } catch(e) {
                alert("清除缓存失败: " + e?.message);
            }
        });

        // 手动合成撤销按钮
        $("btnUndoPlace")?.addEventListener("click", () => {
            undoManualPlace();
        });

        // 手动合成 canvas 点击
        setupManualCanvasHandler();

        // 事件委托：处理手动合成列表项点击
        document.addEventListener("click", e => {
            const bgItem = e.target.closest("#manualBgList .manual-file-item");
            if (bgItem) {
                selectManualBg(bgItem.dataset.path);
                return;
            }
            const srcItem = e.target.closest("#manualSourceList .manual-file-item");
            if (srcItem) {
                toggleManualSourceSelect(srcItem.dataset.path);
                return;
            }
        });

        // 路径变化时重新加载手动合成列表
        if (state.activeTask === "synthesize") {
            const ts = state.formData["synthesize"];
            const synthMode = ts.params?.synthesize_mode || "system";
            if (synthMode === "manual") {
                loadBackgroundList();
                loadMaterialLibrary();
            }
        }
    }

    function saveForm() {
        const s = state.formData[state.activeTask];
        document.querySelectorAll('input[data-kind="path"]').forEach(i => s.paths[i.dataset.key] = i.value);
        document.querySelectorAll('input[data-kind="param"]').forEach(i => s.params[i.dataset.key] = i.value);
        const b = document.querySelector('input[data-kind="backup"]'); if(b) s.backup_dir = b.value;
    }

    // ========== 状态控制 ==========
    function syncStatus(st, msg) {
        const badge = $("globalStatus"), txt = $("statusText");
        badge.className = "status-badge";
        if (st === 'running') { badge.classList.add('running'); txt.textContent = msg || "处理中..."; }
        else if (st === 'success') { badge.classList.add('success'); txt.textContent = msg || "完成"; }
        else if (st === 'fail') { badge.classList.add('error'); txt.textContent = msg || "错误"; }
        else if (st === 'cancelled') { badge.classList.add('error'); txt.textContent = "已取消"; }
        else { txt.textContent = "就绪"; }

        const r = state.running;
        document.body.classList.toggle('is-running', r);
        $("runBtn").disabled = r;
        $("runBtn").style.display = r ? "none" : "";
        $("btnCancelTask").style.display = r ? "" : "none";
        $("btnClearLog").disabled = r;

        const taskState = state.formData[state.activeTask];
        $("btnOpenOut").disabled = r || !taskState.latestOutputPath;
        $("btnOpenBak").disabled = r || !taskState.latestBackupPath;
        document.querySelectorAll('#modeGroup input').forEach(i => i.disabled = r);

        $("runBtn").innerHTML = r
            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10"/><path d="M12 2v4"/></svg> 执行中...'
            : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> 开始执行';
    }

    const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    function updateTimer() { $("timeElapsed").textContent = `耗时 ${state.runStartedAt ? fmtTime(Math.floor((Date.now()-state.runStartedAt)/1000)) : "00:00"}`; }
    function toggleTimer(on) { if(state.elapsedTimer) clearInterval(state.elapsedTimer); if(on) state.elapsedTimer = setInterval(updateTimer, 1000); updateTimer(); }

    function log(lvl, txt) {
        const b = $("terminalLog"), d = document.createElement("div");
        d.className = `log-line log-${lvl}`; d.textContent = txt;
        b.appendChild(d); b.scrollBottom = b.scrollTop = b.scrollHeight;
        // 保存到当前任务的日志
        if (!state.running) return;
        const s = state.formData[state.activeTask];
        if (!s.logs) s.logs = [];
        s.logs.push({ lvl, txt });
    }

    function getSynthesizeTaskState() {
        const task = state.formData["synthesize"];
        if (!task) return null;
        if (!task.sourceAnalysis) {
            task.sourceAnalysis = {
                mode: "unknown",
                ok: true,
                message: "请选择源物体目录后自动检测",
                detected_label: "",
                source_folder: ""
            };
        }
        return task;
    }

    function updateSynthesizeSourceStatusUI() {
        if (state.activeTask !== "synthesize") return;
        const task = getSynthesizeTaskState();
        if (!task) return;
        const box = $("synthesizeSourceStatus");
        if (!box) return;
        const info = task.sourceAnalysis || {};
        const ok = Boolean(info.ok);
        const color = ok ? "#16a34a" : "#dc2626";
        const detected = String(info.detected_label || "").trim();
        const extra = detected ? `（检测标签: ${escapeHtml(detected)}）` : "";
        box.innerHTML = `<span style="font-size:13px;color:${color};">${escapeHtml(info.message || "待检测")}${extra}</span>`;
    }

    function applySynthesizeParamStateUI() {
        if (state.activeTask !== "synthesize") return;
        const task = getSynthesizeTaskState();
        if (!task) return;
        const mode = String(task.sourceAnalysis?.mode || "");
        const targetInput = document.querySelector('input[data-kind="param"][data-key="target_label"]');
        if (!targetInput) return;
        const shouldDisableTarget = mode === "all_without_json" || mode === "all_with_json";
        targetInput.disabled = state.running || shouldDisableTarget;
    }

    // ========== 手动合成 UI ==========
    function setupManualSynthesizeUI() {
        if (state.activeTask !== "synthesize") {
            hideManualSynthesizeUI();
            return;
        }
        const ts = state.formData["synthesize"];
        const synthMode = ts.params?.synthesize_mode || "system";
        state.synthesizeManual.mode = synthMode;

        // 显示主预览容器
        const previewContainer = $("previewContainer");
        if (previewContainer) previewContainer.style.display = "";

        if (synthMode === "manual") {
            showManualSynthesizeUI();
            // 如果已有选中的背景图，重新加载画布
            const sm = state.synthesizeManual;
            if (sm.selectedBg && sm.bgList.length > 0) {
                selectManualBg(sm.selectedBg.bgPath);
            }
        } else {
            hideManualSynthesizeUI();
        }
    }

    // 切换手动合成源物体选中状态
    function toggleManualSourceSelect(sourcePath) {
        const sm = state.synthesizeManual;
        if (sm.selectedSource === sourcePath) {
            sm.selectedSource = null;
        } else {
            sm.selectedSource = sourcePath;
        }
        highlightCurrentMaterial();
    }

    // 暴露给全局 onclick
    window.selectManualBg = selectManualBg;
    window.toggleManualSourceSelect = toggleManualSourceSelect;

    function showManualSynthesizeUI() {
        const area = $("manualSynthesizeArea");
        if (area) area.classList.add("active");
        // 确保主预览容器可见
        const previewContainer = $("previewContainer");
        if (previewContainer) previewContainer.style.display = "";
        // 确保 canvas 区域可显示（切换模式回来时需要恢复）
        const sm = state.synthesizeManual;
        if (sm.selectedBg) {
            const canvasArea = $("manualCanvasArea");
            if (canvasArea) canvasArea.classList.add("active");
        }
        // 素材库折叠交互
        const libHeader = $("materialLibraryHeader");
        if (libHeader && !libHeader._foldBound) {
            libHeader._foldBound = true;
            libHeader.addEventListener("click", () => {
                libHeader.parentElement.classList.toggle("collapsed");
            });
        }
        loadBackgroundList();
        loadMaterialLibrary();
        setupBgNavButtons();
    }

    function hideManualSynthesizeUI() {
        const area = $("manualSynthesizeArea");
        if (area) area.classList.remove("active");
        const canvasArea = $("manualCanvasArea");
        if (canvasArea) canvasArea.classList.remove("active");
        // 隐藏主预览容器
        const previewContainer = $("previewContainer");
        if (previewContainer) previewContainer.style.display = "none";
    }

    // 加载背景图列表（不显示列表，只加载数据）
    async function loadBackgroundList() {
        const ts = state.formData["synthesize"];
        const bgFolder = ts?.paths?.bg_json_folder;
        const api = window.pywebview?.api;

        if (!bgFolder || !api?.list_directory) {
            state.synthesizeManual.bgList = [];
            updateBgIndexDisplay();
            return;
        }

        try {
            const result = await api.list_directory(bgFolder);
            if (!result?.ok) throw new Error(result?.error || "加载失败");
            const files = (result.files || []).filter(f => f.is_image && !f.name.startsWith("."));
            state.synthesizeManual.bgList = files;
            
            // 如果没有选中背景图，自动选中第一张
            if (files.length > 0 && !state.synthesizeManual.selectedBg) {
                await selectManualBg(files[0].path);
            }
            updateBgIndexDisplay();
        } catch (e) {
            console.error("加载背景图列表失败:", e);
            state.synthesizeManual.bgList = [];
            updateBgIndexDisplay();
        }
    }

    // 更新背景图序号显示
    function updateBgIndexDisplay() {
        const display = $("bgIndexDisplay");
        const prevBtn = $("btnPrevBg");
        const nextBtn = $("btnNextBg");
        const bgList = state.synthesizeManual.bgList;
        const currentBg = state.synthesizeManual.selectedBg;

        if (!display) return;

        const total = bgList.length;
        let currentIndex = 0;
        if (currentBg && bgList.length > 0) {
            currentIndex = bgList.findIndex(f => f.path === currentBg.bgPath);
            if (currentIndex < 0) currentIndex = 0;
        }
        state.synthesizeManual.currentBgIndex = currentIndex;

        display.textContent = total > 0 ? `${currentIndex + 1}/${total}` : "0/0";

        if (prevBtn) prevBtn.disabled = currentIndex <= 0;
        if (nextBtn) nextBtn.disabled = currentIndex >= total - 1;
    }

    // 设置背景图导航按钮
    function setupBgNavButtons() {
        const prevBtn = $("btnPrevBg");
        const nextBtn = $("btnNextBg");

        if (prevBtn) {
            prevBtn.onclick = async () => {
                const bgList = state.synthesizeManual.bgList;
                const currentIndex = state.synthesizeManual.currentBgIndex;
                if (currentIndex > 0) {
                    await selectManualBg(bgList[currentIndex - 1].path);
                }
            };
        }

        if (nextBtn) {
            nextBtn.onclick = async () => {
                const bgList = state.synthesizeManual.bgList;
                const currentIndex = state.synthesizeManual.currentBgIndex;
                if (currentIndex < bgList.length - 1) {
                    await selectManualBg(bgList[currentIndex + 1].path);
                }
            };
        }
    }

    // 加载素材库（缩略图形式）
    async function loadMaterialLibrary() {
        const ts = state.formData["synthesize"];
        const srcFolder = ts?.paths?.source_folder;
        const api = window.pywebview?.api;
        const container = $("materialGrid");
        const countDisplay = $("materialCount");

        if (!container) return;
        container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:20px;">加载中...</div>';

        if (!srcFolder || !api?.list_directory) {
            container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:20px;">请先选择源物体目录</div>';
            if (countDisplay) countDisplay.textContent = "";
            return;
        }

        try {
            const result = await api.list_directory(srcFolder);
            if (!result?.ok) throw new Error(result?.error || "加载失败");
            const files = (result.files || []).filter(f => f.is_image && !f.name.startsWith("."));
            state.synthesizeManual.sourceList = files;

            // 切换素材源目录时重置全局放置计数
            if (state.synthesizeManual.lastSourceFolder && state.synthesizeManual.lastSourceFolder !== srcFolder) {
                state.synthesizeManual.placements = [];
                state.synthesizeManual.undoStack = [];
                state.synthesizeManual.placedCount = 0;
                state.synthesizeManual.placementsByBg = {};
                state.synthesizeManual.selectedSource = null;
            }
            state.synthesizeManual.lastSourceFolder = srcFolder;

            if (countDisplay) countDisplay.textContent = `(${files.length}张)`;

            if (files.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:20px;">目录中无图片文件</div>';
                return;
            }

            container.innerHTML = files.map((f, idx) => `
                <div class="material-item" data-path="${escapeAttr(f.path)}" data-index="${idx}" title="${escapeHtml(f.name)}">
                    <img src="file:///${escapeAttr(f.path.replace(/\\/g, '/'))}" loading="lazy">
                    <span class="material-index">${idx + 1}</span>
                </div>
            `).join("");

            // 绑定点击事件
            container.querySelectorAll(".material-item").forEach(el => {
                el.onclick = () => toggleMaterialSelect(el.dataset.path);
            });

            highlightCurrentMaterial();
        } catch (e) {
            container.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">加载失败: ${escapeHtml(e.message)}</div>`;
        }
    }

    // 切换素材选中状态（单选）
    async function toggleMaterialSelect(sourcePath) {
        const sm = state.synthesizeManual;
        // 已放置的素材不可再选
        const alreadyPlaced = sm.placements.some(p => p.sourcePath === sourcePath);
        if (alreadyPlaced) return;

        // 已达全局放置上限的素材不可再选
        const maxPerMaterial = getAppSettings()?.synthesize?.max_placement_per_material || 10;
        if (getGlobalMaterialCount(sourcePath) >= maxPerMaterial) return;

        if (sm.selectedSource === sourcePath) {
            sm.selectedSource = null;
        } else {
            sm.selectedSource = sourcePath;
        }

        highlightCurrentMaterial();

        // 显示当前要放置的素材预览
        if (sm.selectedBg && sm.selectedSource) {
            const placedCount = sm.placedCount || 0;
            if (placedCount < MAX_PLACEMENTS_PER_BG) {
                try {
                    const targetLabel = state.formData.synthesize?.params?.target_label || "";
                    const api = window.pywebview?.api;
                    const result = await api?.get_object_preview({
                        source_path: sm.selectedSource,
                        target_label: targetLabel,
                        max_object_size: parseInt(state.formData.synthesize?.params?.max_object_size) || 350
                    });
                    if (result?.ok && result.image) {
                        showCroppedPreview(result.image);
                    }
                } catch (e) {
                    console.error("获取裁剪预览失败:", e);
                }
            }
        }
    }

    // 高亮当前素材（单选模式）
    // 统计某个素材在所有背景图中的累计放置次数
    function getGlobalMaterialCount(sourcePath) {
        const sm = state.synthesizeManual;
        let count = sm.placements.filter(p => p.sourcePath === sourcePath).length;
        for (const bgPath in sm.placementsByBg) {
            count += (sm.placementsByBg[bgPath].placements || []).filter(p => p.sourcePath === sourcePath).length;
        }
        return count;
    }

    function highlightCurrentMaterial() {
        const selectedSource = state.synthesizeManual.selectedSource;
        const placements = state.synthesizeManual.placements;
        const placedPaths = new Set(placements.map(p => p.sourcePath));
        const maxPerMaterial = getAppSettings()?.synthesize?.max_placement_per_material || 10;

        document.querySelectorAll("#materialGrid .material-item").forEach(el => {
            const path = el.dataset.path;
            el.classList.remove("current", "placed", "selected", "limit-reached");

            // 更新使用次数徽章
            let usageBadge = el.querySelector(".material-usage");
            if (!usageBadge) {
                usageBadge = document.createElement("span");
                usageBadge.className = "material-usage";
                el.appendChild(usageBadge);
            }
            const globalCount = getGlobalMaterialCount(path);
            usageBadge.textContent = globalCount > 0 ? `${globalCount}/${maxPerMaterial}` : "";
            usageBadge.classList.toggle("full", globalCount >= maxPerMaterial);

            if (globalCount >= maxPerMaterial) {
                el.classList.add("limit-reached");
            } else if (placedPaths.has(path)) {
                el.classList.add("placed");
            } else if (path === selectedSource) {
                el.classList.add("selected");
                el.classList.add("current");
            }
        });
    }

    // 在 Canvas 上显示裁剪预览（存储预览图，由 mousemove 跟随鼠标绘制）
    let _previewImg = null;  // 当前待放置的预览图 Image 对象
    let _hoveredPlacementIdx = -1;  // 鼠标悬停的放置项索引（-1=无）
    const MAX_PLACEMENTS_PER_BG = 3;  // 每张背景图最多放置物体数

    // 计算带缩放的绘制参数
    function getScaledDrawParams(p) {
        const s = p.scale || 1.0;
        const w = p.imageWidth * s;
        const h = p.imageHeight * s;
        return { w, h, x: p.clickX - w / 2, y: p.clickY - h / 2 };
    }

    function showCroppedPreview(base64Image) {
        const img = new Image();
        img.onload = () => {
            _previewImg = img;
            state.synthesizeManual.currentCroppedPreview = base64Image;
        };
        img.src = "data:image/png;base64," + base64Image;
    }

    // 绘制跟随鼠标的预览
    function drawPreviewAtMouse(canvasX, canvasY) {
        const canvas = $("manualCanvas");
        const bgImg = $("manualBgImage");
        if (!canvas || !_previewImg) return;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        }
        // 重绘已放置的素材
        const placements = state.synthesizeManual.placements;
        for (const p of placements) {
            if (p.croppedPreview) {
                const placedImg = new Image();
                placedImg.src = "data:image/png;base64," + p.croppedPreview;
                if (placedImg.complete) {
                    const dp = getScaledDrawParams(p);
                    ctx.drawImage(placedImg, dp.x, dp.y, dp.w, dp.h);
                }
            }
        }
        // 半透明跟随鼠标绘制
        ctx.globalAlpha = 0.6;
        ctx.drawImage(_previewImg, canvasX - _previewImg.width / 2, canvasY - _previewImg.height / 2, _previewImg.width, _previewImg.height);
        ctx.globalAlpha = 1.0;
    }

    // 恢复显示背景图
    function restoreBackgroundImage() {
        const bgImg = $("manualBgImage");
        const canvas = $("manualCanvas");
        if (bgImg) bgImg.style.display = "block";
        if (canvas && bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        _previewImg = null;
        state.synthesizeManual.currentCroppedPreview = null;
        redrawManualCanvas();
    }

    // 暴露给全局 onclick
    window.selectManualBg = selectManualBg;
    window.toggleManualSourceSelect = toggleManualSourceSelect;

    async function selectManualBg(bgPath) {
        const ts = state.formData["synthesize"];
        const sm = state.synthesizeManual;
        // 找到对应的 json 文件
        const jsonPath = bgPath.replace(/\.(jpg|jpeg|png|bmp)$/i, ".json");

        // 切换前：保存当前 placements/undoStack/placedCount/selectedSource 到 placementsByBg
        if (sm.selectedBg && sm.selectedBg.bgPath !== bgPath) {
            if (sm.placements.length > 0) {
                await saveManualSynthesize();
            }
            sm.placementsByBg[sm.selectedBg.bgPath] = {
                placements: [...sm.placements],
                undoStack: [...sm.undoStack],
                placedCount: sm.placedCount,
                selectedSource: sm.selectedSource
            };
        }

        // 切换后：重置
        sm.selectedBg = { bgPath, jsonPath };
        sm.selectedSource = null;
        sm.placements = [];
        sm.undoStack = [];
        sm.placedCount = 0;

        // 清除所有素材 UI 高亮
        document.querySelectorAll("#materialGrid .material-item").forEach(el => {
            el.classList.remove("current", "placed", "selected");
        });

        // 切换后：检查 placementsByBg 是否存在，存在则恢复
        const saved = sm.placementsByBg[bgPath];
        if (saved) {
            sm.placements = [...saved.placements];
            sm.undoStack = [...saved.undoStack];
            sm.placedCount = saved.placedCount;
            sm.selectedSource = saved.selectedSource;
        }

        // 更新背景图序号显示
        updateBgIndexDisplay();

        // 加载背景图到 canvas
        const canvasArea = $("manualCanvasArea");
        const bgImg = $("manualBgImage");
        const canvas = $("manualCanvas");
        if (!canvasArea || !bgImg || !canvas) return;

        canvasArea.classList.add("active");
        bgImg.onload = async () => {
            canvas.width = bgImg.naturalWidth;
            canvas.height = bgImg.naturalHeight;
            bgImg.style.display = "block";

            if (saved && saved.placements.length > 0) {
                await redrawPlacements();
                highlightCurrentMaterial();
            } else {
                restoreBackgroundImage();
            }

            // 如果有选中的原图且还没放置，显示裁剪预览
            if (sm.selectedSource && sm.placedCount < MAX_PLACEMENTS_PER_BG) {
                try {
                    const targetLabel = state.formData.synthesize?.params?.target_label || "";
                    const api = window.pywebview?.api;
                    const result = await api?.get_object_preview({
                        source_path: sm.selectedSource,
                        target_label: targetLabel,
                        max_object_size: parseInt(state.formData.synthesize?.params?.max_object_size) || 350
                    });
                    if (result?.ok && result.image) {
                        showCroppedPreview(result.image);
                    }
                } catch (e) {
                    console.error("获取裁剪预览失败:", e);
                }
            }
        };
        bgImg.onerror = () => {
            bgImg.style.display = "none";
        };
        bgImg.src = bgPath;
    }

    function getSelectedSourceImage() {
        const sm = state.synthesizeManual;
        if (!sm.selectedSource) return null;
        const count = sm.placedCount || 0;
        if (count >= 1) return null;
        return sm.selectedSource;
    }

    function getCurrentSourceIndex() {
        const sm = state.synthesizeManual;
        if (!sm.selectedSource) return -1;
        return 0;
    }

    function renderPlacedList() {
        const container = $("placedList");
        const undoBtn = $("btnUndoPlace");
        if (!container) return;

        const placements = state.synthesizeManual.placements;
        if (placements.length === 0) {
            container.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">点击背景图放置物体</span>';
        } else {
            container.innerHTML = placements.map((p, i) => `
                <div class="placed-item" style="flex-direction:column;align-items:stretch;gap:4px;">
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span>${escapeHtml(p.sourcePath.split(/[\\/]/).pop())}</span>
                        <span style="color:var(--text-muted);">(${Math.round(p.clickX)}, ${Math.round(p.clickY)})</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;font-size:11px;">
                        <span style="color:var(--text-muted);white-space:nowrap;">缩放</span>
                        <input type="range" min="0.2" max="3" step="0.1" value="${p.scale || 1}" data-scale-index="${i}" style="flex:1;height:16px;cursor:pointer;">
                        <span class="scale-value" style="color:var(--text-muted);min-width:32px;text-align:right;">${Math.round((p.scale || 1) * 100)}%</span>
                    </div>
                </div>
            `).join("");
            // 绑定缩放滑块事件
            container.querySelectorAll('input[data-scale-index]').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.scaleIndex);
                    const newScale = parseFloat(e.target.value);
                    if (idx >= 0 && idx < placements.length) {
                        placements[idx].scale = newScale;
                        // 更新显示的百分比
                        e.target.nextElementSibling.textContent = Math.round(newScale * 100) + '%';
                        // 重绘 canvas
                        redrawPlacements();
                    }
                });
            });
        }
        if (undoBtn) undoBtn.disabled = placements.length === 0;
    }

    // Canvas 点击放置 & 拖动
    function setupManualCanvasHandler() {
        const canvas = $("manualCanvas");
        if (!canvas) return;

        // ===== 拖动状态 =====
        let _dragIdx = -1;        // 正在拖动的 placement 索引
        let _dragOffsetX = 0;     // 拖动偏移
        let _dragOffsetY = 0;
        let _mouseDownPos = null;  // 记录 mousedown 位置，用于区分点击/拖动
        let _isDragging = false;  // 是否正在拖动
        let _isPlacing = false;   // 是否正在放置（防止重复点击）

        // ===== 键盘 A/D 切换背景图 =====
        document.addEventListener('keydown', (e) => {
            if (state.running) return;
            if (state.activeTask !== "synthesize" || state.synthesizeManual.mode !== "manual") return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            const bgList = state.synthesizeManual.bgList;
            if (!bgList || bgList.length === 0) return;
            const currentIndex = state.synthesizeManual.currentBgIndex;
            if (e.key === 'a' || e.key === 'A') {
                if (currentIndex > 0) selectManualBg(bgList[currentIndex - 1].path);
            } else if (e.key === 'd' || e.key === 'D') {
                if (currentIndex < bgList.length - 1) selectManualBg(bgList[currentIndex + 1].path);
            }
        });

        // ===== hit-test =====
        function hitTestPlacement(cx, cy) {
            const placements = state.synthesizeManual.placements;
            for (let i = placements.length - 1; i >= 0; i--) {
                const dp = getScaledDrawParams(placements[i]);
                if (cx >= dp.x && cx <= dp.x + dp.w && cy >= dp.y && cy <= dp.y + dp.h) {
                    return i;
                }
            }
            return -1;
        }

        // ===== 绘制高亮轮廓 =====
        function drawHighlight(placement) {
            const canvas = $("manualCanvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const dp = getScaledDrawParams(placement);
            ctx.save();
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 3]);
            ctx.strokeRect(dp.x, dp.y, dp.w, dp.h);
            ctx.restore();
        }

        // ===== 鼠标按下 =====
        canvas.onmousedown = (e) => {
            if (e.button !== 0) return;  // 只处理左键
            const sm = state.synthesizeManual;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const cx = (e.clientX - rect.left) * scaleX;
            const cy = (e.clientY - rect.top) * scaleY;

            _mouseDownPos = { cx, cy, clientX: e.clientX, clientY: e.clientY };
            _isDragging = false;

            // 检测是否点中了已放置的物体
            const hitIdx = hitTestPlacement(cx, cy);
            if (hitIdx >= 0) {
                _dragIdx = hitIdx;
                const p = sm.placements[hitIdx];
                _dragOffsetX = cx - p.clickX;
                _dragOffsetY = cy - p.clickY;
                e.preventDefault();
            }
        };

        // ===== 鼠标移动：跟随预览 + 悬停高亮 + 拖动 =====
        canvas.onmousemove = (e) => {
            const sm = state.synthesizeManual;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const cx = (e.clientX - rect.left) * scaleX;
            const cy = (e.clientY - rect.top) * scaleY;

            // 拖动模式
            if (_dragIdx >= 0 && _mouseDownPos) {
                const dist = Math.abs(cx - _mouseDownPos.cx) + Math.abs(cy - _mouseDownPos.cy);
                if (dist > 3) _isDragging = true;
                if (_isDragging) {
                    const placement = sm.placements[_dragIdx];
                    placement.clickX = cx - _dragOffsetX;
                    placement.clickY = cy - _dragOffsetY;
                    redrawPlacements();
                    drawHighlight(placement);
                    renderPlacedList();
                }
                return;
            }

            // 未放置满且有选中素材时，跟随鼠标预览
            if (sm.selectedSource && sm.placedCount < MAX_PLACEMENTS_PER_BG && _previewImg) {
                drawPreviewAtMouse(cx, cy);
                return;
            }

            // 已放置物体：检测悬停高亮
            const hitIdx = hitTestPlacement(cx, cy);
            if (hitIdx !== _hoveredPlacementIdx) {
                _hoveredPlacementIdx = hitIdx;
                redrawPlacements();
                if (hitIdx >= 0) {
                    drawHighlight(sm.placements[hitIdx]);
                    canvas.style.cursor = "move";
                } else {
                    canvas.style.cursor = "crosshair";
                }
            }
        };

        // 鼠标离开画布
        canvas.onmouseleave = () => {
            const sm = state.synthesizeManual;
            if (_dragIdx >= 0) {
                // 拖动中离开画布，结束拖动
                _dragIdx = -1;
                _isDragging = false;
                _mouseDownPos = null;
            }
            if (sm.selectedSource && sm.placedCount < MAX_PLACEMENTS_PER_BG && _previewImg) {
                restoreBackgroundImage();
            }
            if (_hoveredPlacementIdx >= 0) {
                _hoveredPlacementIdx = -1;
                redrawPlacements();
            }
        };

        // ===== 鼠标释放：放置或结束拖动 =====
        canvas.onmouseup = async (e) => {
            if (e.button !== 0) return;
            const sm = state.synthesizeManual;

            // 如果正在拖动，结束拖动
            if (_isDragging && _dragIdx >= 0) {
                _dragIdx = -1;
                _isDragging = false;
                _mouseDownPos = null;
                return;
            }
            _dragIdx = -1;
            _isDragging = false;
            _mouseDownPos = null;

            // 否则执行点击放置逻辑
            const placedCount = sm.placedCount || 0;

            if (!sm.selectedSource) {
                return;  // 没选中素材时点击不做任何事
            }

            if (placedCount >= MAX_PLACEMENTS_PER_BG) {
                alert(`每张背景图最多放置 ${MAX_PLACEMENTS_PER_BG} 个物体`);
                return;
            }

            // 每个素材的放置次数限制（从 settings 读取，默认 10，跨所有背景图统计）
            const maxPerMaterial = getAppSettings()?.synthesize?.max_placement_per_material || 10;
            const globalMaterialCount = getGlobalMaterialCount(sm.selectedSource);
            if (globalMaterialCount >= maxPerMaterial) {
                alert(`每个素材最多放置 ${maxPerMaterial} 次（当前已放置 ${globalMaterialCount} 次）`);
                return;
            }

            const selectedSource = sm.selectedSource;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            if (clickX < 0 || clickY < 0 || clickX > canvas.width || clickY > canvas.height) {
                return;
            }

            const bgImg = $("manualBgImage");
            if (bgImg && bgImg.naturalWidth > 0) {
                const bgRect = bgImg.getBoundingClientRect();
                const bgScaleX = bgImg.naturalWidth / bgRect.width;
                const bgScaleY = bgImg.naturalHeight / bgRect.height;
                const bgClickX = (e.clientX - bgRect.left) * bgScaleX;
                const bgClickY = (e.clientY - bgRect.top) * bgScaleY;
                if (bgClickX < 0 || bgClickY < 0 || bgClickX > bgImg.naturalWidth || bgClickY > bgImg.naturalHeight) {
                    return;
                }
            }

            // 显示加载提示，防止重复点击
            if (_isPlacing) return;
            _isPlacing = true;
            canvas.style.cursor = "wait";

            const targetLabel = state.formData.synthesize?.params?.target_label || "";
            const api = window.pywebview?.api;

            try {
                const result = await api?.get_object_preview({
                    source_path: selectedSource,
                    target_label: targetLabel,
                    max_object_size: parseInt(state.formData.synthesize?.params?.max_object_size) || 350
                });

                if (result?.ok && result.image) {
                    const img = new Image();
                    img.onload = () => {
                        const imageWidth = img.naturalWidth;
                        const imageHeight = img.naturalHeight;

                        const placement = {
                            sourcePath: selectedSource,
                            clickX,
                            clickY,
                            imageWidth,
                            imageHeight,
                            croppedPreview: result.image,
                            sourceIndex: placedCount,
                            scale: 1.0
                        };
                        state.synthesizeManual.placements.push(placement);
                        state.synthesizeManual.undoStack.push(state.synthesizeManual.placements.length - 1);
                        state.synthesizeManual.placedCount = placedCount + 1;

                        // 放置完成后清除鼠标跟随预览
                        _previewImg = null;
                        // 放置后取消选中当前素材，防止重复放置
                        sm.selectedSource = null;

                        redrawPlacements();
                        renderPlacedList();
                        highlightCurrentMaterial();
                        // 恢复光标
                        canvas.style.cursor = "crosshair";
                        _isPlacing = false;
                    };
                    img.src = "data:image/png;base64," + result.image;
                } else {
                    canvas.style.cursor = "crosshair";
                    _isPlacing = false;
                    const errorMsg = result?.error || "原图可能没有对应的 JSON 标注文件";
                    if (errorMsg.includes("JSON") || errorMsg.includes("标注")) {
                        alert("裁剪失败：该图片缺少 LabelMe JSON 标注文件，请先标注后再放置");
                    } else {
                        alert("裁剪预览失败: " + errorMsg);
                    }
                }
            } catch (err) {
                console.error("获取裁剪预览失败:", err);
                canvas.style.cursor = "crosshair";
                _isPlacing = false;
                alert("裁剪预览失败: " + err.message);
            }
        };

        // ===== 滚轮缩放 =====
        canvas.onwheel = (e) => {
            const sm = state.synthesizeManual;
            const idx = _hoveredPlacementIdx;
            if (idx < 0 || idx >= sm.placements.length) return;
            e.preventDefault();
            const placement = sm.placements[idx];
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newScale = Math.max(0.2, Math.min(3.0, (placement.scale || 1.0) + delta));
            placement.scale = Math.round(newScale * 10) / 10;
            redrawPlacements();
            drawHighlight(placement);
            renderPlacedList();
        };
    }

    async function showNextSourcePreview() {
        const sm = state.synthesizeManual;
        const placedCount = sm.placedCount || 0;
        if (placedCount >= MAX_PLACEMENTS_PER_BG || !sm.selectedSource) {
            sm.currentCroppedPreview = null;
            restoreBackgroundImage();
            return;
        }
        const nextSource = sm.selectedSource;
        if (sm.selectedBg) {
            try {
                const targetLabel = state.formData.synthesize?.params?.target_label || "";
                const api = window.pywebview?.api;
                const result = await api?.get_object_preview({
                    source_path: nextSource,
                    target_label: targetLabel,
                    max_object_size: parseInt(state.formData.synthesize?.params?.max_object_size) || 350
                });
                if (result?.ok && result.image) {
                    showCroppedPreview(result.image);
                }
            } catch (e) {
                console.error("获取下一张裁剪预览失败:", e);
            }
        }
    }

    // 撤销
    function undoManualPlace() {
        if (state.synthesizeManual.placements.length === 0) return;
        const removed = state.synthesizeManual.placements.pop();
        state.synthesizeManual.undoStack.pop();
        if (state.synthesizeManual.placedCount > 0) {
            state.synthesizeManual.placedCount--;
        }
        // 撤销后把被撤销的素材重新选中，方便重新放置
        if (removed) {
            state.synthesizeManual.selectedSource = removed.sourcePath;
        }
        _hoveredPlacementIdx = -1;
        redrawManualCanvas();
        renderPlacedList();
        highlightCurrentMaterial();
        showNextSourcePreview();
    }

    async function redrawPlacements() {
        const bgImg = $("manualBgImage");
        const canvas = $("manualCanvas");
        if (!canvas || !bgImg || !bgImg.complete || bgImg.naturalWidth === 0) return;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

        const placements = state.synthesizeManual.placements;
        for (const p of placements) {
            const img = new Image();
            await new Promise(resolve => {
                img.onload = () => {
                    const dp = getScaledDrawParams(p);
                    ctx.drawImage(img, dp.x, dp.y, dp.w, dp.h);
                    resolve();
                };
                img.onerror = resolve;
                img.src = p.croppedPreview ? "data:image/png;base64," + p.croppedPreview : p.sourcePath;
            });
        }

        renderPlacedList();
    }

    async function redrawManualCanvas() {
        const bgImg = $("manualBgImage");
        const canvas = $("manualCanvas");
        if (!canvas || !bgImg || !bgImg.complete) return;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const placements = state.synthesizeManual.placements;
        for (const p of placements) {
            const img = new Image();
            await new Promise(resolve => {
                img.onload = () => {
                    const dp = getScaledDrawParams(p);
                    ctx.drawImage(img, dp.x, dp.y, dp.w, dp.h);
                    resolve();
                };
                img.onerror = resolve;
                // 如果有裁剪预览，使用它
                img.src = p.croppedPreview ? "data:image/png;base64," + p.croppedPreview : p.sourcePath;
            });
        }
    }

    // 自动保存

        const sm = state.synthesizeManual;
        if (!sm.selectedBg || sm.placements.length === 0) return;

        const ts = state.formData["synthesize"];
        if (!ts?.paths) return;
        
        const payload = {
            task: "synthesize_manual_save",
            paths: {
                source_folder: ts.paths.source_folder || "",
                bg_json_folder: ts.paths.bg_json_folder || "",
                output_folder: ts.paths.output_folder || ""
            },
            params: {
                label: ts.params?.label || "",
                target_label: ts.params?.target_label || "",
                bg_path: sm.selectedBg.bgPath,
                bg_json_path: sm.selectedBg.jsonPath,
                placements: sm.placements.map(p => ({
                    source_path: p.sourcePath,
                    click_x: Math.round(p.clickX),
                    click_y: Math.round(p.clickY),

                }))

    function handleSynthesizeModeChange(newMode) {
        state.synthesizeManual.mode = newMode;
        // 不要在这里调用 showManualSynthesizeUI()

    async function inspectSynthesizeSource(force = false) {
        const task = getSynthesizeTaskState();
        if (!task) return;
        const sourceFolder = String(task.paths?.source_folder || "").trim();
        if (!sourceFolder) {
            task.sourceAnalysis = {
                mode: "unknown",
                ok: true,
                message: "请选择源物体目录后自动检测",
                detected_label: "",
                source_folder: ""
            };
            updateSynthesizeSourceStatusUI();
            applySynthesizeParamStateUI();
            return;
        }

        if (!force && task.sourceAnalysis?.source_folder === sourceFolder) {
            updateSynthesizeSourceStatusUI();
            applySynthesizeParamStateUI();
            return;
        }

        const token = ++state.synthesizeInspectToken;
        task.sourceAnalysis = {
            mode: "checking",
            ok: true,
            message: "正在检测源目录规则...",
            detected_label: "",
            source_folder: sourceFolder
        };
        updateSynthesizeSourceStatusUI();
        applySynthesizeParamStateUI();

        const api = window.pywebview?.api;
        if (!api?.inspect_synthesize_source) {
            task.sourceAnalysis = {
                mode: "unknown",
                ok: true,
                message: "当前环境未连接后端，无法自动检测",
                detected_label: "",
                source_folder: sourceFolder
            };
            updateSynthesizeSourceStatusUI();
            applySynthesizeParamStateUI();
            return;
        }

        try {
            const res = await api.inspect_synthesize_source({ source_folder: sourceFolder });
            if (token !== state.synthesizeInspectToken) return;
            const mode = String(res?.mode || "error");
            const ok = Boolean(res?.ok);
            const detectedLabel = String(res?.detected_label || "").trim();

            if (ok && mode === "all_with_json") {
                task.params.target_label = detectedLabel;
                task.params.label = detectedLabel;
                task.sourceAnalysis = {
                    mode,
                    ok: true,
                    message: "检测到源目录图片全部带 JSON，已自动填充标签",
                    detected_label: detectedLabel,
                    source_folder: sourceFolder
                };
            } else if (ok && mode === "all_without_json") {
                task.params.target_label = "";
                task.sourceAnalysis = {
                    mode,
                    ok: true,
                    message: "检测到源目录图片不带 JSON，请填写合成后标注标签",
                    detected_label: "",
                    source_folder: sourceFolder
                };
            } else {
                task.sourceAnalysis = {
                    mode,
                    ok: false,
                    message: String(res?.error || "源目录不合规，请整理后重试"),
                    detected_label: "",
                    source_folder: sourceFolder
                };
            }
            const targetInput = document.querySelector('input[data-kind="param"][data-key="target_label"]');
            if (targetInput) targetInput.value = task.params.target_label || "";
            const labelInput = document.querySelector('input[data-kind="param"][data-key="label"]');
            if (labelInput) labelInput.value = task.params.label || "";
        } catch (e) {
            if (token !== state.synthesizeInspectToken) return;
            task.sourceAnalysis = {
                mode: "error",
                ok: false,
                message: e?.message || "源目录检测失败",
                detected_label: "",
                source_folder: sourceFolder
            };
        }

        updateSynthesizeSourceStatusUI();
        applySynthesizeParamStateUI();
    }

    // 模型状态检测与下载
    function updateMetrics(s) {
        $("metricSuccess").textContent = s.success_count || "0";
        $("metricFail").textContent = s.fail_count || "0";
        $("metricSkip").textContent = s.skipped_count || "0";

        const outputPath = s.output_path || "";
        const backupPath = s.backup_path || "";

        $("outPathLabel").textContent = outputPath || "未就绪";
        $("outPathLabel").title = outputPath || "未就绪";
        $("bakPathLabel").textContent = backupPath || "未就绪";
        $("bakPathLabel").title = backupPath || "未就绪";

        $("btnOpenOut").disabled = !outputPath;
        $("btnOpenBak").disabled = !backupPath;

        const err = $("errorHint");
        if(s.error) { err.style.color = "var(--danger)"; err.textContent = s.error; }
        else { err.style.color = "var(--success)"; err.textContent = "运行正常"; }

        // 保存到当前任务的结果
        const taskState = state.formData[state.activeTask];
        taskState.result = { success_count: s.success_count, fail_count: s.fail_count, skipped_count: s.skipped_count, output_path: outputPath, backup_path: backupPath, error: s.error };
        taskState.latestOutputPath = outputPath;
        taskState.latestBackupPath = backupPath;
    }

    // ========== 核心业务逻辑 ==========
    function buildPayload(forPrev=false) {
        ensureTaskState(state.activeTask);
        const t = TASKS[state.activeTask], s = state.formData[state.activeTask], p = {task:state.activeTask, mode:state.mode, paths:{}, params:{}};
        t.paths.forEach(f => { if(!(forPrev && f.safeOnly)){ const v=String(s.paths[f.key]||"").trim(); if(v) p.paths[f.key]=v; } });
        t.params.forEach(f => { const v=String(s.params[f.key]||"").trim(); if(v) p.params[f.key]=f.type==='number'?Number(v):v; });
        if(t.supportsInputMode) {
            const inputMode = s.input_mode || 'folder';
            p.paths.input_mode = inputMode;
            const mainInput = p.paths.input_dir || p.paths.input_path || "";
            if(inputMode === 'file') {
                p.paths.input_path = mainInput;
                p.paths.input_file = mainInput;
                if(state.activeTask === 'rename2') p.paths.source_file = mainInput;
                if(state.activeTask === 'json_path') p.paths.json_file = mainInput;
            } else {
                p.paths.input_dir = mainInput;
                if(state.activeTask === 'rename2') p.paths.source_dir = mainInput;
                if(state.activeTask === 'json_path') p.paths.json_dir = mainInput;
            }
        }
        if (forPrev) {
            const settings = getAppSettings();
            p.recursive = Boolean(settings.preview?.recursive);
            p.sample_limit = Number(settings.preview?.sample_limit || 20);
        }
        return p;
    }

    function ensureTaskState(taskKey) {
        if (!state.formData[taskKey]) {
            state.formData[taskKey] = {
                paths: {},
                params: {},
                backup_dir: "",
                input_mode: "folder",
                logs: [],
                result: null,
                previewData: null,
                sourceAnalysis: {
                    mode: "unknown",
                    ok: true,
                    message: "请选择源物体目录后自动检测",
                    detected_label: "",
                    source_folder: ""
                }
            };
        }
    }

    // 预览逻辑 (抽屉详情模式)
    function triggerPreview() {
        if (state.previewTimer) clearTimeout(state.previewTimer);
        const settings = getAppSettings();
        const debounce = Math.max(120, Number(settings.preview?.debounce_ms || 300));
        state.previewTimer = setTimeout(async () => {
            const p = buildPayload(true), box = $("previewContainer"), sum = $("previewSummary");
            const taskState = state.formData[state.activeTask];
            const mainPath = p.paths.input_dir || p.paths.input_path || p.paths.source_dir || p.paths.json_dir || p.paths.source_folder || p.paths.bg_json_folder || "";

            // 如果没有路径，清空预览
            if (!Object.keys(p.paths).length || !mainPath) {
                sum.textContent = "请先选择有效路径";
                box.innerHTML = '<div class="preview-empty">暂无数据</div>';
                taskState.previewData = null;
                return;
            }

            sum.textContent = "分析中..."; box.innerHTML = '<div class="preview-empty">正在读取目录结构...</div>';
            const api = window.pywebview?.api;
            if (!api?.preview_path) {
                // 没有API时显示提示
                sum.textContent = "预览功能需要后端支持";
                return;
            }

            try {
                const r = await api.preview_path(p);
                if (!r || r.ok === false) throw new Error((r && r.error) ? r.error : "路径解析失败");
                // 保存预览数据
                taskState.previewData = r;

                // 解析sections
                const secs = r.sections || (r.data ? [r.data] : [r]);
                if (!secs.length || !secs[0]) {
                    sum.textContent = "未找到受支持的文件";
                    box.innerHTML = '<div class="preview-empty">当前目录下没有支持处理的文件</div>';
                    return;
                }

                const totalFiles = Number(r.total_files || 0);
                const summaryCounts = normalizeCounts(r.counts_by_ext);
                const summaryText = summaryCounts.slice(0, 4).map(i => `${i.count} ${i.label}`).join(" / ");
                sum.textContent = totalFiles > 0 ? `共 ${totalFiles} 个文件${summaryText ? `（${summaryText}）` : ""}` : `发现 ${secs.length} 个数据组`;
                box.innerHTML = `<div class="preview-list">` + secs.map(sec => {
                    const counts = normalizeCounts(sec.counts || sec.counts_by_ext);
                    const cnts = counts.map(i => `<span class="tag tag-blue">${escapeHtml(i.label||'文件')}×${i.count||0}</span>`).join("");
                    const samples = sec.samples || sec.sample_files || [];
                    const smps = samples.map(sa => `<span class="sample-file" title="${escapeAttr(sa)}">${escapeHtml(truncatePath(sa))}</span>`).join("");

                    return `
                        <div class="preview-item">
                            <div class="preview-item-top">
                                <div class="preview-item-info">
                                    <div class="preview-title-row">
                                        <div class="preview-block-title">${escapeHtml(sec.title||sec.name||'目录')}</div>
                                        <div class="preview-path" title="${escapeAttr(sec.path||'')}">${escapeHtml(truncatePath(sec.path||''))}</div>
                                    </div>
                                    <div class="tag-row">${cnts || '<span class="hint">无相关文件统计</span>'}</div>
                                </div>
                                <button class="btn btn-icon" style="width: auto; height: 24px; padding: 0 8px; font-size: 11px;" onclick="togglePreviewDetails(this)">详细 ▾</button>
                            </div>
                            <div class="preview-samples">
                                <div class="samples-wrapper">
                                    ${smps || '<span class="hint" style="padding: 4px;">没有可展示的样本</span>'}
                                </div>
                            </div>
                        </div>`;
                }).join("") + `</div>`;
                if (settings.preview?.expand_details_by_default) {
                    box.querySelectorAll(".preview-samples").forEach(el => el.classList.add("expanded"));
                    box.querySelectorAll(".preview-item .btn.btn-icon").forEach(el => { el.textContent = "收起 ▴"; });
                }
            } catch (e) {
                sum.textContent = "路径解析失败"; box.innerHTML = `<div class="preview-empty" style="color:var(--danger)">${escapeHtml(e.message)}</div>`;
            }
        }, debounce);
    }

    // 执行逻辑
    async function runTask() {
        if(state.running) return;
        try {
            saveForm();
            const t = TASKS[state.activeTask];
            const p = buildPayload();
            if (state.activeTask === "synthesize") {
                const synthMode = p.params?.synthesize_mode || "system";
                if (synthMode === "manual") {
                    // 手动模式：收集所有背景图 placements，构建批量执行 payload
                    const sm = state.synthesizeManual;
                    // 把当前背景图的 placements 也先存入 placementsByBg
                    if (sm.selectedBg && sm.placements.length > 0) {
                        sm.placementsByBg[sm.selectedBg.bgPath] = {
                            placements: [...sm.placements],
                            undoStack: [...sm.undoStack],
                            placedCount: sm.placedCount,
                            selectedSource: sm.selectedSource
                        };
                    }
                    // 收集所有已放置的背景图
                    const placementsList = [];
                    for (const [bgPath, bgData] of Object.entries(sm.placementsByBg)) {
                        if (bgData.placements && bgData.placements.length > 0) {
                            placementsList.push({
                                bg_path: bgPath,

                                    scale: pl.scale || 1.0
                                }))

                        }
                    }
                    if (placementsList.length === 0) {

                    }
                    // 覆盖 payload：任务改为 synthesize_manual_run

                    p.params = {
                        label: p.params.label || "",
                        target_label: p.params.target_label || "",
                        max_object_size: p.params.max_object_size || 350,

            t.paths.forEach(f => { if(f.safeOnly && state.mode==="in_place") return; if(f.required && !p.paths[f.key]) throw new Error(`请指定${f.label}`); });
            t.params.forEach(f => { if(f.required && p.params[f.key]===undefined) throw new Error(`请填写参数: ${f.label}`); });

                await inspectSynthesizeSource(false);

                    throw new Error("源目录检测尚未完成，请稍后重试");

                if (analysis.ok === false) {

                        const close = (val) => { modal.classList.add('hidden'); $("btnConfirm").onclick=null; $("btnCancel").onclick=null; res(val); };

            const res = await api.run_task(p);
            if(!res?.ok) throw new Error(res?.error || "任务启动失败");

            state.taskId = res.task_id; state.logIndex = 0; state.pollToken++;

            const tk = state.pollToken;
            if(state.pollTimer) clearInterval(state.pollTimer);
            state.pollTimer = setInterval(async () => {
                if(tk !== state.pollToken || !state.taskId) return;
                if(api.get_task_logs) {
                    const r = await api.get_task_logs(state.taskId, state.logIndex);
                    if(r?.ok) {
                        state.logIndex = Number(r.next_index || state.logIndex);
                        (r.logs||[]).forEach(l => { const m = String(l||"").match(/^\[[^\]]+\]\s+\[([A-Z]+)\]\s+(.*)$/); m ? log(m[1].toLowerCase()==='error'||m[1].toLowerCase()==='warn'?m[1].toLowerCase():'info', m[2]) : log('info', l); });
                    }
                }
                if(api.get_task_status) {
                    const s = await api.get_task_status(state.taskId);
                    if(s) {
                        updateMetrics(s);
                        if(s.status === "success" || s.status === "fail" || s.status === "cancelled") {
                            clearInterval(state.pollTimer); state.running = false; toggleTimer(false);
                            syncStatus(s.status, s.status === "success" ? "执行成功" : s.status === "cancelled" ? "已取消" : "执行失败");
                            if (s.status === "success") {

                                }
                                triggerPreview();
                            }
                        }
                    }
                }
            }, 300);

        } catch(e) {
            state.running = false; toggleTimer(false); syncStatus("fail", e.message); log("error", e.message);
        }
    }
